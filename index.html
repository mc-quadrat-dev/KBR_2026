<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Nächster Halt: Mitbestimmung</title>
<style>
/* ============================================================================
   NÄCHSTER HALT: MITBESTIMMUNG — Styles
   ----------------------------------------------------------------------------
   Aufbau:
     1. Grundlayout & Karte
     2. HUD (oben) & Linienmenü (unten)
     3. Stations-Dock (frei platzierbare Station, rechts)
     4. Tutorial-Bubbles, Toasts, Schwebetexte
     5. Screens (Start / Ende)
     6. Demo-/Kiosk-Overlays
     7. SVG-Spielelemente (Stationen, Punkte, Linien, FX)
   ============================================================================ */

/* ---------- 1. Grundlayout & Karte ---------- */
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #4167a3;                 /* Meeresfarbe als Fallback */
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  -webkit-tap-highlight-color: transparent;
  -webkit-user-select: none; user-select: none;
  touch-action: none;                  /* verhindert Pinch-Zoom/Scroll im Kiosk */
}

#app { position: fixed; inset: 0; }

/* Die Karte füllt den Bildschirm immer komplett (slice = "cover") */
#stage { position: absolute; inset: 0; cursor: crosshair; touch-action: none; }
#mapSvg { width: 100%; height: 100%; display: block; }
#mapSvg * { pointer-events: none; }    /* alle Treffertests macht das Spiel selbst */

/* Kontinent-Aufleuchten nach Klick (Wunsch-Kontinent für nächste Station) */
#mapSvg #Land path { transition: filter 0.45s ease; }
#mapSvg path.continent-flash { filter: brightness(1.8) saturate(1.2); }

/* ---------- 1b. Abfahrtstafel (oben links, einklappbar) ----------
   Eingeklappt: nur ein rundes Uhr-Icon. Ausgeklappt: Liste aller
   wartenden Anliegen mit Station, Farbe und Restzeit-Countdown. */
#departureBoard {
  position: absolute; top: 10px; left: 10px; z-index: 50;
  color: #fff; overflow: hidden;
  width: 280px; max-width: 78vw;
  transition: width 0.25s ease;
}
#departureBoard.hidden { display: none; }
#departureBoard.collapsed { width: 46px; }
#boardToggle {
  display: flex; align-items: center; gap: 9px;
  width: 100%; min-height: 44px; padding: 10px 11px;
  background: none; border: none; cursor: pointer; color: #fff;
  font-family: inherit; font-size: 14px; font-weight: 700;
  white-space: nowrap; text-align: left;
}
#boardToggle svg { flex: 0 0 auto; }
#departureBoard.collapsed #boardTitleText { opacity: 0; }

/* Einklapp-Pfeil rechts im Kopf (nur ausgeklappt sichtbar) */
#boardArrow { margin-left: auto; font-size: 13px; opacity: 0.8; }
#departureBoard.collapsed #boardArrow { opacity: 0; }

/* Notification-Badge am eingeklappten Uhr-Icon: Anzahl wartender Anliegen */
#boardBadge {
  position: absolute; top: 2px; right: 2px;
  min-width: 18px; height: 18px; padding: 0 5px;
  border-radius: 9px; background: #e20074; color: #fff;
  font-size: 11px; font-weight: 800; line-height: 1;
  display: none; align-items: center; justify-content: center;
  pointer-events: none;
  box-shadow: 0 1px 4px rgba(0, 10, 35, 0.5), 0 0 0 1.5px rgba(255, 255, 255, 0.55);
}
#departureBoard.collapsed #boardBadge.show { display: flex; }
#boardList {
  list-style: none; margin: 0; padding: 2px 12px 12px;
  max-height: min(330px, 52vh); overflow-y: auto;
}
#departureBoard.collapsed #boardList { display: none; }
#boardList li {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 0; font-size: 13px; font-weight: 600;
  border-top: 1px solid rgba(255,255,255,0.12);
}
#boardList li.empty { opacity: 0.6; border-top: none; font-weight: 500; }
#boardList .b-dots { display: flex; gap: 3px; flex: 0 0 auto; }
#boardList .b-dot { width: 12px; height: 12px; border-radius: 50%; box-shadow: 0 0 0 1.5px rgba(255,255,255,0.7); }
#boardList .b-name { flex: 1 1 auto; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
#boardList .b-time { flex: 0 0 auto; font-variant-numeric: tabular-nums; opacity: 0.9; }
#boardList li.urgent .b-time { color: #ff5a5a; opacity: 1; font-weight: 800; }

/* ---------- 2. HUD & Linienmenü ---------- */
.glass {
  background: rgba(8, 20, 52, 0.55);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.22);
  border-radius: 16px;
  box-shadow: 0 6px 24px rgba(0, 10, 35, 0.35);
}

#hud {
  position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
  display: flex; align-items: center; gap: clamp(8px, 1.4vw, 22px);
  padding: 8px clamp(10px, 1.4vw, 20px);
  z-index: 50; color: #fff;
  max-width: calc(100vw - 16px);
}
#hud.hidden, #lineMenu.hidden, #stationDock.hidden,
#screen-start.hidden, #screen-end.hidden, #screen-info.hidden,
#demoGlow.hidden, #demoBadge.hidden, #demoHint.hidden { display: none; }

.hud-block { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
.hud-label { font-size: clamp(10px, 1.1vw, 13px); letter-spacing: 0.06em; text-transform: uppercase; color: #fff; opacity: 0.92; white-space: nowrap; }
.hud-value { font-size: clamp(15px, 1.7vw, 21px); font-weight: 700; font-variant-numeric: tabular-nums; white-space: nowrap; }

/* Stabilitätsbalken */
#stabilityBar { width: clamp(90px, 14vw, 200px); height: 12px; border-radius: 6px; background: rgba(255,255,255,0.18); overflow: hidden; }
#stabilityFill { height: 100%; width: 100%; border-radius: 6px; background: #46d98c; transition: width 0.25s linear, background-color 0.4s; }
#stabilityRow { display: flex; align-items: center; gap: 8px; }

/* Einfluss-Hervorhebung (Tutorial) */
#influenceBlock.attention { animation: hudPulse 0.9s ease-in-out 4; border-radius: 10px; }
@keyframes hudPulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(226,0,116,0); }
  50%      { box-shadow: 0 0 0 6px rgba(226,0,116,0.55); }
}

/* Neustart-Button */
#restartBtn {
  border: 1px solid rgba(255,255,255,0.35); background: rgba(255,255,255,0.12);
  color: #fff; border-radius: 12px; cursor: pointer;
  font-size: clamp(13px, 1.3vw, 16px); font-weight: 600;
  padding: 10px 14px; min-height: 44px;
  font-family: inherit;
}
#restartBtn:active { background: rgba(255,255,255,0.28); }
#restartBtn .r-icon { display: none; } /* Icon nur im schmalen Seitenlayout */

/* Linienmenü unten */
#lineMenu {
  position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
  display: flex; align-items: center; gap: clamp(6px, 1vw, 14px);
  padding: 8px clamp(8px, 1vw, 14px);
  z-index: 50;
  max-width: calc(100vw - 16px);
}
#lineMenu.attention { animation: hudPulse 0.9s ease-in-out 4; }

.line-btn {
  display: flex; align-items: center; gap: 9px;
  border: 2px solid rgba(255,255,255,0.18); border-radius: 14px;
  background: rgba(255,255,255,0.07); color: #fff; cursor: pointer;
  padding: 10px clamp(8px, 1.2vw, 18px); min-height: 52px;
  font-size: clamp(12px, 1.3vw, 16px); font-weight: 600;
  font-family: inherit;
  transition: border-color 0.2s, background-color 0.2s, transform 0.15s;
  white-space: nowrap;
}
.line-btn .dot { width: 18px; height: 18px; border-radius: 50%; flex: 0 0 auto; box-shadow: 0 0 0 2px rgba(255,255,255,0.65); }
.line-btn.active { border-color: #fff; background: rgba(255,255,255,0.22); transform: scale(1.05); }
/* Erster Farbwechsel-Moment: der passende Button hüpft wie das Stations-Dock,
   mit Glow in seiner Linienfarbe (--btnColor wird je Button per JS gesetzt) */
.line-btn.jump {
  border-color: #fff;
  animation: dockBounce 0.75s ease-in-out infinite, btnGlow 1.1s ease-in-out infinite;
}
@keyframes btnGlow {
  0%, 100% { box-shadow: 0 0 6px 1px var(--btnColor); }
  50%      { box-shadow: 0 0 22px 7px var(--btnColor); }
}
@media (max-width: 760px) { .line-btn span.label { display: none; } } /* schmale Screens: nur Farbpunkte */

/* ---------- 3. Stations-Dock (frei platzierbare Station) ----------
   Kompakter Kreis dauerhaft mittig zwischen den vier Linien-Buttons —
   kaum höher als die Buttons selbst. Die Beschriftung ("Nächste Station"
   bzw. Stationsname + Countdown) schwebt mittig über der Leiste.
   Ohne Angebot: ausgegraut. Mit Angebot (.active): Magenta + Puls. */
#stationDock {
  position: relative; /* Anker für Label + Pfeil darüber */
  display: flex; align-items: center; justify-content: center;
  padding: 4px; color: #fff;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.15);
  border-radius: 14px;
  touch-action: none;
  transition: background-color 0.3s, border-color 0.3s;
}
/* Aktiv: kräftiges Magenta + pulsierender Glow — jetzt platzieren! */
#stationDock.active {
  background: rgba(226, 0, 116, 0.55);
  border-color: rgba(255, 255, 255, 0.7);
  animation: dockWake 0.4s ease-out, dockGlow 1.1s ease-in-out 0.4s infinite;
}
/* Allererstes Angebot: das komplette Element hüpft — maximal prominent */
#stationDock.active.first {
  animation: dockWake 0.4s ease-out,
             dockGlow 1.1s ease-in-out 0.4s infinite,
             dockBounce 0.75s ease-in-out 0.4s infinite;
}
@keyframes dockWake {
  0%   { transform: scale(0.92); }
  55%  { transform: scale(1.1); }
  100% { transform: scale(1); }
}
@keyframes dockGlow {
  0%, 100% { box-shadow: 0 0 6px 1px rgba(226, 0, 116, 0.4); }
  50%      { box-shadow: 0 0 22px 7px rgba(226, 0, 116, 0.85); }
}
@keyframes dockBounce {
  0%, 100% { transform: translateY(0); }
  40%      { transform: translateY(-14px); }
  60%      { transform: translateY(-14px) scale(1.04); }
}
/* Ausgegrauter Zustand: matter Dot, kein Puls, kein Countdown-Ring */
#stationDock:not(.active) #dockDot { background: rgba(255, 255, 255, 0.22); animation: none; box-shadow: none; }
#stationDock:not(.active) #dockRing .left { opacity: 0; }
#stationDock:not(.active) #dockDotWrap { cursor: default; }

/* Beschriftung schwebt exakt mittig ÜBER dem Kreis (rein informativ,
   fängt keine Eingaben ab) */
#dockLabel {
  position: absolute; bottom: calc(100% + 32px); left: 50%; transform: translateX(-50%);
  display: flex; gap: 8px; align-items: baseline; white-space: nowrap;
  padding: 5px 12px; border-radius: 10px;
  background: rgba(8, 20, 52, 0.55);
  border: 1px solid rgba(255, 255, 255, 0.2);
  font-size: 13px; font-weight: 700; color: #fff;
  opacity: 0.55;
  pointer-events: none;
  transition: opacity 0.3s, background-color 0.3s, border-color 0.3s;
}
#stationDock.active #dockLabel {
  opacity: 1;
  background: rgba(226, 0, 116, 0.85);
  border-color: rgba(255, 255, 255, 0.7);
}
/* Hüpfender Pfeil zwischen Label und Kreis — nur im aktiven Zustand */
#dockArrow {
  position: absolute; bottom: calc(100% + 4px); left: 50%;
  display: none; pointer-events: none;
  color: #ff5fae; font-size: 18px; line-height: 1;
  text-shadow: 0 2px 6px rgba(0, 10, 35, 0.7);
}
#stationDock.active #dockArrow { display: block; animation: arrowBounce 0.7s ease-in-out infinite; }
@keyframes arrowBounce {
  0%, 100% { transform: translate(-50%, 0); }
  50%      { transform: translate(-50%, 8px); }
}
#dockDotWrap { position: relative; width: 52px; height: 52px; cursor: grab; touch-action: none; }
#dockDot {
  position: absolute; inset: 10px; border-radius: 50%;
  background: #fff; box-shadow: 0 2px 10px rgba(0,10,35,0.5);
  animation: dockPulse 1.1s ease-in-out infinite;
  pointer-events: none;
}
#dockDotWrap.warn #dockDot { animation: dockPulse 0.4s ease-in-out infinite; }
@keyframes dockPulse {
  0%, 100% { transform: scale(1); }
  50%      { transform: scale(1.18); }
}
#dockRing { position: absolute; inset: 0; transform: rotate(-90deg); pointer-events: none; }
#dockRing circle { fill: none; stroke-width: 5; }
#dockRing .track { stroke: rgba(255,255,255,0.25); }
#dockRing .left  { stroke: #46d98c; transition: stroke 0.2s; }
#dockDotWrap.warn #dockRing .left { stroke: #ff5a5a; }
#dockTimer { font-size: 12px; font-weight: 600; opacity: 0.85; font-variant-numeric: tabular-nums; }

/* ---------- 4. Tutorial-Bubbles, Toasts, Schwebetexte ---------- */
#bubbleLayer, #toastLayer, #fxHtmlLayer { position: absolute; inset: 0; pointer-events: none; }
#bubbleLayer { z-index: 56; }
#toastLayer  { z-index: 57; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; gap: 8px; padding-bottom: 86px; }
#fxHtmlLayer { z-index: 55; }

.bubble {
  position: absolute; transform: translate(-50%, calc(-100% - 18px));
  max-width: min(340px, 46vw); padding: 13px 17px;
  background: rgba(10, 24, 60, 0.6);
  backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
  border: 1px solid rgba(255,255,255,0.35); border-left: 5px solid #e20074;
  border-radius: 16px; color: #fff;
  font-size: clamp(14px, 1.6vw, 19px); font-weight: 600; line-height: 1.35;
  box-shadow: 0 8px 30px rgba(0, 10, 35, 0.45);
  pointer-events: auto; cursor: pointer; /* Tipp/Klick blendet die Blase aus */
  transition: opacity 0.25s;
}
.bubble::after { /* kleiner Pfeil nach unten zum Zielobjekt */
  content: ""; position: absolute; left: 50%; bottom: -9px; transform: translateX(-50%) rotate(45deg);
  width: 16px; height: 16px; background: rgba(10, 24, 60, 0.78);
  border-right: 1px solid rgba(255,255,255,0.35); border-bottom: 1px solid rgba(255,255,255,0.35);
}
.bubble.below { transform: translate(-50%, 18px); }
.bubble.below::after { bottom: auto; top: -9px; transform: translateX(-50%) rotate(225deg); }
.bubble.side { transform: translate(calc(-100% - 18px), -50%); }
.bubble.side::after { left: auto; right: -9px; bottom: auto; top: 50%; transform: translateY(-50%) rotate(-45deg); }
.bubble.side-right { transform: translate(18px, -50%); }
.bubble.side-right::after { left: -9px; right: auto; bottom: auto; top: 50%; transform: translateY(-50%) rotate(135deg); }
.bubble.error { border-left-color: #ff4040; background: rgba(70, 8, 18, 0.66); }
.bubble.error::after { background: rgba(70, 8, 18, 0.8); }
/* Maus darüber → weiches "Loch" um den Cursor (Maskenposition folgt der Maus) */
.bubble.masked {
  -webkit-mask-image: radial-gradient(circle at var(--mx) var(--my), transparent 0, transparent 42px, #000 100px);
  mask-image: radial-gradient(circle at var(--mx) var(--my), transparent 0, transparent 42px, #000 100px);
}
.bubble.out { opacity: 0; transition: opacity 0.45s; }

.toast {
  padding: 10px 18px; border-radius: 12px; color: #fff;
  background: rgba(10, 24, 60, 0.7);
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.3);
  font-size: clamp(13px, 1.4vw, 17px); font-weight: 600;
  animation: toastIn 0.25s ease-out;
  max-width: min(480px, 86vw); text-align: center;
}
.toast.error { background: rgba(160, 18, 30, 0.78); border-color: rgba(255,120,120,0.6); }
.toast.out { opacity: 0; transition: opacity 0.35s; }
@keyframes toastIn { from { opacity: 0; transform: translateY(12px); } }

/* Schwebende Belohnungstexte (+2 % etc.) */
.floatText {
  position: absolute; transform: translate(-50%, -50%); pointer-events: none;
  font-size: clamp(13px, 1.5vw, 18px); font-weight: 800; color: #fff;
  text-shadow: 0 1px 5px rgba(0,10,35,0.8);
  animation: floatUp 1.3s ease-out forwards;
}
@keyframes floatUp { to { opacity: 0; transform: translate(-50%, calc(-50% - 56px)); } }

/* Kosten-Chip am Mauszeiger beim Linienziehen */
#costChip {
  position: absolute; display: none; pointer-events: none; z-index: 58;
  padding: 5px 11px; border-radius: 10px; color: #fff;
  background: rgba(10, 24, 60, 0.8); border: 1px solid rgba(255,255,255,0.4);
  font-size: 14px; font-weight: 700; transform: translate(14px, -38px);
}
#costChip.tooExpensive { background: rgba(160, 18, 30, 0.85); border-color: #ff8080; }

/* ---------- 5. Screens (Start / Ende) ---------- */
.screen {
  position: absolute; inset: 0; z-index: 60;
  display: flex; align-items: center; justify-content: center;
  background: rgba(5, 14, 40, 0.45); padding: 18px;
}
.screen-card { position: relative; padding: clamp(22px, 4vw, 48px); text-align: center; color: #fff; max-width: min(620px, 94vw); }

/* Versionsnummer (oben rechts) und Info-Button (oben links) in der Start-Box */
#versionTag {
  position: absolute; top: 12px; right: 16px;
  font-size: clamp(11px, 1.2vw, 14px); font-weight: 600; opacity: 0.6;
  letter-spacing: 0.04em;
}
#infoBtn {
  position: absolute; top: 10px; left: 12px;
  width: 40px; height: 40px; border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.45); background: rgba(255,255,255,0.1);
  color: #fff; font-size: 19px; font-weight: 700; font-style: italic;
  font-family: Georgia, "Times New Roman", serif;
  cursor: pointer; line-height: 1;
}
#infoBtn:active { background: rgba(255,255,255,0.28); }

/* Info-Overlay: Anleitung + Punktevergabe.
   Hintergrund transparent — der Startscreen darunter dunkelt bereits ab,
   sonst würde sich die Abdunklung doppeln. */
#screen-info { z-index: 62; background: transparent; }
#infoCard {
  padding: clamp(20px, 3vw, 36px); color: #fff; text-align: left;
  width: min(720px, 94vw); max-height: 88vh; overflow-y: auto;
}
#infoCard h2 { font-size: clamp(20px, 2.6vw, 28px); margin-bottom: 14px; }
#infoCard h3 { font-size: clamp(15px, 1.8vw, 19px); margin: 18px 0 10px; color: #ff5fae; }
#infoCard ol { margin: 0 0 4px 22px; }
#infoCard ol li { font-size: clamp(13px, 1.5vw, 16px); line-height: 1.45; margin-bottom: 7px; }

/* Punktetabelle: je Thema (Netzstabilität / Einfluss) zwei Spalten */
.scoring-section { margin-bottom: 14px; }
.scoring-section h4 {
  font-size: clamp(14px, 1.6vw, 17px); margin: 0 0 8px;
  letter-spacing: 0.03em;
}
.scoring-table { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.scoring-table .col {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.14);
  border-radius: 12px; padding: 10px 12px;
}
.col-head { font-size: clamp(12px, 1.4vw, 15px); font-weight: 700; margin-bottom: 8px; }
.col.plus  .col-head { color: #46d98c; }
.col.minus .col-head { color: #ff7a7a; }
@media (max-width: 560px) { .scoring-table { grid-template-columns: 1fr; } } /* schmal: untereinander */

#infoCard .scoring { list-style: none; margin: 0; }
#infoCard .scoring li {
  font-size: clamp(12px, 1.4vw, 15px); line-height: 1.4; margin-bottom: 6px;
  padding-left: 20px; position: relative;
}
#infoCard .scoring li:last-child { margin-bottom: 0; }
#infoCard .scoring li::before {
  content: ""; position: absolute; left: 2px; top: 0.5em;
  width: 9px; height: 9px; border-radius: 50%;
}
#infoCard .scoring.plus  li::before { background: #46d98c; }
#infoCard .scoring.minus li::before { background: #ff5a5a; }
#infoCard .big-btn { margin-top: 16px; min-width: 180px; }

#screen-start h1 { font-size: clamp(26px, 4.4vw, 52px); line-height: 1.12; margin-bottom: 10px; }
#screen-start h1 .accent { color: #ff5fae; }
#screen-start .subtitle { font-size: clamp(14px, 1.8vw, 20px); opacity: 0.9; margin-bottom: 18px; }
#screen-start .intro { font-size: clamp(14px, 1.7vw, 19px); line-height: 1.5; margin-bottom: 26px; opacity: 0.95; }

.big-btn {
  display: inline-block; border: none; cursor: pointer;
  background: #e20074; color: #fff;
  font-size: clamp(17px, 2.2vw, 24px); font-weight: 800;
  font-family: inherit;
  padding: 16px 42px; min-height: 60px; min-width: 220px;
  border-radius: 18px; box-shadow: 0 6px 24px rgba(226, 0, 116, 0.5);
  transition: transform 0.12s, box-shadow 0.2s;
}
.big-btn:active { transform: scale(0.96); }
.ghost-btn {
  display: inline-block; border: 1px solid rgba(255,255,255,0.45); cursor: pointer;
  background: transparent; color: #fff; font-size: clamp(13px, 1.5vw, 17px); font-weight: 600;
  font-family: inherit;
  padding: 12px 22px; min-height: 48px; border-radius: 14px;
}

/* Endscreen: querformatige Karte (Bild links, Text rechts) */
#endCard {
  display: flex; align-items: stretch; gap: 0; overflow: hidden;
  width: min(940px, 94vw); max-height: min(560px, 86vh);
  color: #fff; text-align: left; padding: 0;
}
#endImageWrap { flex: 0 0 38%; min-height: 240px; position: relative; background: #0a1840; }
#endImage { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
#endImagePlaceholder { position: absolute; inset: 0; display: none; align-items: center; justify-content: center; }
#endImagePlaceholder svg { width: 42%; height: auto; opacity: 0.9; }
#endCard.no-image #endImage { display: none; }
#endCard.no-image #endImagePlaceholder { display: flex; }
#endCard.win  #endImagePlaceholder { background: linear-gradient(145deg, #0c7a4e, #0a4432); }
#endCard.lose #endImagePlaceholder { background: linear-gradient(145deg, #8f1020, #600512); }
#endBody { flex: 1 1 62%; padding: clamp(18px, 3vw, 38px); display: flex; flex-direction: column; justify-content: center; gap: 12px; overflow: hidden; }
#endTitle { font-size: clamp(22px, 3.2vw, 38px); line-height: 1.15; }
#endStability { font-size: clamp(15px, 1.9vw, 21px); font-weight: 800; color: #ff5fae; }
#endText { font-size: clamp(14px, 1.6vw, 18px); line-height: 1.45; opacity: 0.96; }
#endEventMsg { font-size: clamp(12px, 1.3vw, 15px); font-style: italic; opacity: 0.75; line-height: 1.4; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 12px; }
#endButtons { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 4px; }
/* Hochkant-/Schmalfall: Karte stapeln, bleibt aber kompakt */
@media (max-width: 640px) {
  #endCard { flex-direction: column; max-height: 92vh; overflow-y: auto; }
  #endImageWrap { flex: 0 0 150px; min-height: 150px; }
}

/* ---------- 6. Demo-/Kiosk-Overlays ---------- */
#demoGlow {
  position: fixed; inset: 0; pointer-events: none; z-index: 80;
  animation: demoGlow 2.6s ease-in-out infinite;
}
@keyframes demoGlow {
  0%, 100% { box-shadow: inset 0 0 130px 26px rgba(226, 0, 116, 0.55); }
  50%      { box-shadow: inset 0 0 90px 14px rgba(226, 0, 116, 0.3); }
}
#demoBadge {
  position: fixed; top: 16px; right: 22px; z-index: 81; pointer-events: none;
  color: #fff; font-size: clamp(18px, 2.4vw, 30px); font-weight: 800; letter-spacing: 0.28em;
}
#demoHint {
  position: fixed; bottom: 156px; left: 50%; transform: translateX(-50%); /* schwebt über Linienmenü + Dock-Label */
  z-index: 81; pointer-events: none; color: #fff; opacity: 0.85;
  font-size: clamp(13px, 1.5vw, 18px); font-weight: 600;
  animation: demoHintPulse 2.6s ease-in-out infinite;
  white-space: nowrap;
}
@keyframes demoHintPulse { 0%, 100% { opacity: 0.85; } 50% { opacity: 0.35; } }

/* Roter Vollbild-Blitz bei Fehlern */
#flash {
  position: fixed; inset: 0; z-index: 70; pointer-events: none;
  background: #d61f3c; opacity: 0; transition: opacity 0.5s ease-out;
}
#flash.on { opacity: 0.4; transition: opacity 0.05s; }

/* Weicher Übergang beim Demo-Rundenwechsel */
#fade {
  position: fixed; inset: 0; z-index: 90; pointer-events: none;
  background: #061030; opacity: 0; transition: opacity 0.35s;
}
#fade.on { opacity: 1; }

/* ---------- 7. SVG-Spielelemente ---------- */
/* Stationen */
.station-halo  { fill: rgba(3, 12, 35, 0.4); }
.station-shape { fill: #fff; stroke-width: 14px; }
.station-label {
  fill: #fff; font-size: 96px; font-weight: 650;
  paint-order: stroke; stroke: rgba(5, 14, 40, 0.65); stroke-width: 28px; stroke-linejoin: round;
  text-anchor: middle;
  font-family: inherit;
}
.station-group .pop { transform-box: fill-box; transform-origin: center; animation: popIn 0.5s ease-out; }
@keyframes popIn { 0% { transform: scale(0); } 65% { transform: scale(1.35); } 100% { transform: scale(1); } }

/* Auswahlring beim Antippen einer Station */
.select-ring { fill: none; stroke: #fff; stroke-width: 14px; stroke-dasharray: 50 34; opacity: 0.95; }

/* Warnringe an überlasteten Stationen */
.warn-ring { fill: none; stroke-width: 18px; transform-box: fill-box; transform-origin: center; }
.warn-ring.lvl1 { stroke: rgba(255, 205, 80, 0.95); animation: warnPulse 1.2s ease-in-out infinite; }
.warn-ring.lvl2 { stroke: rgba(255, 80, 80, 1);     animation: warnPulse 0.55s ease-in-out infinite; }
@keyframes warnPulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.16); opacity: 0.55; } }

/* Verbindungen (Linien) */
.connection { fill: none; stroke-linecap: round; stroke-linejoin: round; }
.connection.reveal { transition: stroke-dashoffset 0.45s ease-out; }
.connection.bad { animation: connBad 0.9s ease-out; }
@keyframes connBad { 0%, 60% { stroke: #ff3030; } 100% {} }
.ghost-line { fill: none; stroke-linecap: round; stroke-linejoin: round; opacity: 0.65; stroke-dasharray: 80 60; }
.ghost-line.invalid { stroke: #ff4040 !important; }

/* Punkte / Anliegen */
.point-dot { stroke: #fff; stroke-width: 10px; }
.point-dot.spawn { transform-box: fill-box; transform-origin: center; animation: pointSpawn 1.6s ease-out; }
@keyframes pointSpawn { 0% { transform: scale(0); } 25% { transform: scale(1.8); } 55% { transform: scale(1.45); } 100% { transform: scale(1); } }
.point-dot.bad { stroke: #ff3030; }

/* Freie Punkte: pulsierender Umgebungsradius */
.wild-aura { fill: none; stroke-width: 12px; transform-box: fill-box; transform-origin: center; animation: wildAura 1.5s ease-in-out infinite; }
@keyframes wildAura { 0%, 100% { transform: scale(0.8); opacity: 0.9; } 50% { transform: scale(1.25); opacity: 0.25; } }
.wild-tag {
  fill: #fff; font-size: 80px; font-weight: 800; text-anchor: middle;
  paint-order: stroke; stroke: rgba(5,14,40,0.7); stroke-width: 24px;
  font-family: inherit;
}

/* FX: Pulsring (Aufmerksamkeit) und Erfolgsring */
.fx-pulse { fill: none; transform-box: fill-box; transform-origin: center; animation: fxPulse 0.9s ease-out forwards; }
@keyframes fxPulse { 0% { transform: scale(0.4); opacity: 1; } 100% { transform: scale(1.9); opacity: 0; } }
.fx-ripple { fill: none; stroke: #fff; transform-box: fill-box; transform-origin: center; animation: fxPulse 0.7s ease-out forwards; }

/* ---------- 8. Mobile ----------
   a) Schmale Screens (Hochformat): alles kompakter, Linien nur als Farbpunkte.
   b) Flache Quer-Screens (Smartphone querkant): UI dreht an die Seiten —
      HUD links als Spalte, Linienmenü + Dock rechts als Spalte. */
@media (max-width: 760px) {
  #hud { top: 6px; gap: 8px; padding: 6px 10px; }
  .hud-value { font-size: 13px; }
  .hud-label { font-size: 9px; }
  #stabilityBar { width: 64px; height: 9px; }
  #restartBtn { padding: 6px 9px; min-height: 36px; font-size: 12px; }
  #departureBoard { top: 56px; left: 6px; }
  #lineMenu { bottom: 8px; padding: 6px; gap: 6px; }
  .line-btn { min-height: 44px; padding: 8px 10px; }
  #dockDotWrap { width: 44px; height: 44px; }
  #dockDot { inset: 8px; }
  #dockLabel { font-size: 11px; padding: 4px 9px; bottom: calc(100% + 24px); }
  #demoHint { bottom: 132px; font-size: 12px; white-space: normal; text-align: center; max-width: 86vw; }
}

@media (orientation: landscape) and (max-height: 540px) {
  /* HUD: schmale linke Spalte (so breit wie das Abfahrtstafel-Icon),
     ohne Headlines — vertikaler Stabilitätsbalken, nur Werte, Icon-Neustart */
  #hud {
    left: 8px; top: 62px; transform: none;
    flex-direction: column; align-items: center; gap: 10px;
    padding: 10px 4px; width: 46px;
  }
  .hud-label { display: none; }
  .hud-block { align-items: center; gap: 4px; }
  #stabilityRow { flex-direction: column; gap: 5px; }
  #stabilityBar { width: 10px; height: 84px; }
  .hud-value { font-size: 11px; }
  #restartBtn { padding: 0; width: 34px; min-height: 34px; font-size: 17px; border-radius: 10px; }
  #restartBtn .r-text { display: none; }
  #restartBtn .r-icon { display: inline; }

  #departureBoard { top: 8px; left: 8px; }

  /* Linienmenü: rechte Spalte, nur Farbpunkte */
  #lineMenu {
    left: auto; right: 8px; bottom: auto; top: 50%;
    transform: translateY(-50%);
    flex-direction: column; gap: 6px; padding: 6px;
    max-height: calc(100dvh - 16px); max-width: none;
  }
  .line-btn { min-height: 42px; padding: 8px; justify-content: center; }
  .line-btn span.label { display: none; }
  #dockDotWrap { width: 42px; height: 42px; }
  #dockDot { inset: 8px; }
  /* Dock-Beschriftung + Pfeil links neben dem Kreis */
  #dockLabel {
    bottom: auto; left: auto; right: calc(100% + 12px); top: 50%;
    transform: translateY(-50%); font-size: 11px; padding: 4px 9px;
  }
  #dockArrow { bottom: auto; left: auto; right: calc(100% + 2px); top: 50%; }
  #stationDock.active #dockArrow { animation: arrowBounceSide 0.7s ease-in-out infinite; }

  #demoHint { bottom: 12px; font-size: 12px; }
  #demoBadge { top: 8px; right: 12px; font-size: 16px; }
}
/* Pfeil zeigt im Seitenlayout nach rechts auf den Dot und wippt horizontal */
@keyframes arrowBounceSide {
  0%, 100% { transform: translateY(-50%) rotate(-90deg) translateY(0); }
  50%      { transform: translateY(-50%) rotate(-90deg) translateY(8px); }
}
</style>
