<script src="texts.js"></script>
<script>
"use strict";
/* ============================================================================
   NÄCHSTER HALT: MITBESTIMMUNG — Spiellogik
   ----------------------------------------------------------------------------
   Gliederung (per Suche springen):
     [1]  Konstanten & Balancing      → Balancing-Werte hier ändern!
     [2]  DOM-Referenzen & Helfer
     [3]  Karten-Geometrie (Koordinaten, Kontinent-Tests, Spawn-Punkte)
     [4]  Spielzustand & Reset
     [5]  Screen-Verwaltung
     [6]  Spielstart / Spielende
     [7]  Haupt-Loop (eine zentrale requestAnimationFrame-Schleife)
     [8]  Stationen (Spawns, Rendering, frei platzierbare Station)
     [9]  Verbindungen / Linienbau (inkl. Drag & Drop, Kosten)
     [10] Anliegen / Punkte (Spawns, Transport, freie Punkte)
     [11] Stabilität & Einfluss
     [12] Tutorial & Feedback (Bubbles, Toasts, FX, Flash)
     [13] Demo-/Kiosk-Modus (Bot, Glow, Endlosbetrieb)
     [14] Eingaben (Pointer-Events, Inaktivität)
     [15] Init
   ============================================================================ */

/* ====================================================================== [1]
   KONSTANTEN & BALANCING — alle Stellschrauben des Spiels
   ====================================================================== */
const T = window.GAME_TEXTS; // Alle Texte kommen aus texts.js

const BALANCE = {
  /* Spielzeit */
  gameDuration: 120,          // Sekunden aktive Spielzeit

  /* Netzstabilität (Prozent) */
  stabilityStart: 100,
  stabilityMax: 100,
  passiveHeal: 0.1,           // +% pro Sekunde (passive Heilung)
  rewardStability: 1,         // +% pro korrekt transportiertem Anliegen
  penaltyWrongLine: 10,       // -% sofort bei falscher Linienfarbe
  overloadThreshold: 2,       // ab so vielen wartenden Punkten gilt eine Station als überlastet
  overloadDrain: 1.0,         // -% pro Sekunde je überlasteter Station
  strandedDrain: 0.5,         // -% pro Sekunde je wartendem Punkt an Station OHNE Verbindung
  strandedGrace: 6,           // Sekunden Karenz, bevor "gestrandet" Stabilität zieht
  wildDrain: 0.5,             // -% pro Sekunde je freiem Punkt auf einem Kontinent
  wildGrace: 3,               // Sekunden Karenz für frische freie Punkte

  /* Einfluss (Bau-Währung) */
  influenceStart: 400,
  influenceMax: 400,
  rewardInfluence: 5,         // +Einfluss pro korrekt transportiertem Anliegen
  costMin: 5,                 // Kosten kürzeste Verbindung
  costMax: 50,                // Kosten längste Verbindung
  costRefLength: 4800,        // Kartenlänge (Einheiten), ab der die Maximalkosten gelten
  influenceHintBelow: 100,    // Tutorial-Hinweis erst unterhalb dieses Werts

  /* Punkt-Spawns (Anliegen) */
  pointSpawnStart: 4.2,       // Sekunden zwischen Punkt-Spawns zu Beginn
  pointSpawnAccel: 0.88,      // Beschleunigungsfaktor …
  pointSpawnAccelEvery: 15,   // … angewendet alle X Sekunden
  pointSpawnMin: 1.7,         // schnellster Spawn-Takt
  firstPointDelay: 7.5,       // Sekunden bis zum allerersten Anliegen
  wildFrom: 60,               // ab dieser Sekunde können freie Punkte erscheinen (Minute 1)
  wildChance: 0.10,           // Anteil freier Punkte (10 %)
  maxWaitingPerStation: 4,    // mehr wartende Punkte pro Station gibt es nicht
  maxPointsTotal: 26,         // globale Obergrenze gleichzeitiger Punkte
  pointSpeed: 950,            // Reisegeschwindigkeit (Karteneinheiten/s)
  boardDelay: 0.6,            // kurzes Verweilen, bevor ein Punkt einsteigt
  wrongBoardAfter: 5,         // nach X s ohne passende Linie nimmt ein Punkt notfalls die falsche
  lateColorFrom: 40,          // ab dieser Sekunde können Stationspunkte auch fremde Farben haben
  lateColorChance: 0.25,      // … mit dieser Wahrscheinlichkeit

  /* Stations-Spawns */
  stationSchedule: [0, 6, 14, 22],  // Zeitpunkte (s) der ersten vier automatischen Stationen
  stationInterval: 13,        // Abstand (s) ab Station 5
  stationIntervalMin: 8,      // minimaler Abstand am Spielende
  stationIntervalDecay: 0.94, // Verkürzung pro weiterer Station
  grabWindow: 3.0,            // Sekunden Zeit, den Dot im Dock zu greifen
  grabWindowFirst: 8.0,       // … beim allerersten Angebot (mehr Zeit zum Verstehen)
  minStationDist: 620,        // Mindestabstand neuer Stationen zu bestehenden (Karteneinheiten)
  pickupRadiusStation: 750,   // Radius, in dem neue Stationen freie Punkte aufsammeln
  pickupRadiusLine: 280,      // Toleranz, mit der neue Linien freie Punkte aufsammeln
  wildMinStationDist: 650,    // freie Punkte erscheinen nicht direkt neben Stationen

  /* Kiosk / Demo */
  idleToDemoMenu: 20,         // s Inaktivität auf Start-/Endscreen bis zur Demo
  idleToDemoGame: 35,         // s Inaktivität im laufenden Spiel bis zur Demo
                              //   (etwas länger, damit nachdenkende Spieler:innen
                              //    nicht mitten im Spiel unterbrochen werden)
  idleToDemoInfo: 60,         // s Inaktivität bei geöffneter Anleitung
                              //   (Lesen erzeugt keine Events — mehr Zeit lassen)
  demoBotInterval: 1.1,       // s zwischen Bot-Aktionen
  demoHealBelow: 55,          // Demo stabilisiert sich unterhalb dieses Werts selbst …
  demoHealRate: 3.0,          // … mit +% pro Sekunde extra
};

/* Die vier Linien: Farbe + Zuordnung zum gleichfarbigen Kontinent.
   Die Farbtöne folgen der Stilreferenz (Weltkarte_Finish.svg), leicht
   aufgehellt für gute Erkennbarkeit auf den dunklen Kontinenten. */
const LINES = {
  blue:    { id: "blue",    color: "#1a5cf5" }, // Mitbestimmung        ↔ dunkelblauer Kontinent
  magenta: { id: "magenta", color: "#e20074" }, // Beschäftigung        ↔ Bordeaux-Kontinent
  coral:   { id: "coral",   color: "#ff623c" }, // Personalentwicklung  ↔ rotbrauner Kontinent
  green:   { id: "green",   color: "#16a878" }, // Arbeitszeitpolitik   ↔ dunkelgrüner Kontinent
};
const LINE_IDS = Object.keys(LINES);

/* Kontinente: SVG-Klassen der Landpfade (aus Weltkarte_start.svg) je Farbe */
const CONTINENTS = {
  green:   { classes: ["st0", "st1"] }, // Dunkelgrün  #0a4432 (Nordwesten)
  magenta: { classes: ["st3"] },        // Bordeaux    #930051 (Mitte)
  blue:    { classes: ["st4"] },        // Dunkelblau  #00216b (Osten)
  coral:   { classes: ["st5"] },        // Rotbraun    #961512 (Südwesten)
};

const SVG_NS = "http://www.w3.org/2000/svg";
const MAP_W = 9627.4, MAP_H = 5415.4;

/* ====================================================================== [2]
   DOM-REFERENZEN & ALLGEMEINE HELFER
   ====================================================================== */
const $ = (id) => document.getElementById(id);
const stage = $("stage"), mapSvg = $("mapSvg");
const gConnections = $("gameConnections"), gGhost = $("gameGhost"),
      gPoints = $("gamePoints"), gStations = $("gameStations"), gFx = $("gameFx");
const hud = $("hud"), lineMenu = $("lineMenu"), dock = $("stationDock"), dockLabel = $("dockLabel");
const bubbleLayer = $("bubbleLayer"), toastLayer = $("toastLayer"), fxHtmlLayer = $("fxHtmlLayer");
const costChip = $("costChip");

const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
const dist = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);
const randOf = (arr) => arr[Math.floor(Math.random() * arr.length)];

function svgEl(tag, attrs = {}) {
  const el = document.createElementNS(SVG_NS, tag);
  for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
  return el;
}

/* Zentrale Timeout-Verwaltung: Beim Reset werden ALLE offenen Timer gestoppt,
   damit kein alter Effekt/Hinweis in die neue Runde "hineinfeuert". */
const pendingTimers = new Set();
function after(seconds, fn) {
  const id = setTimeout(() => { pendingTimers.delete(id); fn(); }, seconds * 1000);
  pendingTimers.add(id);
  return id;
}
function cancelAfter(id) {
  clearTimeout(id);
  pendingTimers.delete(id);
}
function clearAllTimers() {
  for (const id of pendingTimers) clearTimeout(id);
  pendingTimers.clear();
}

/* ====================================================================== [3]
   KARTEN-GEOMETRIE — Koordinaten, Kontinent-Tests, Spawn-Punkte
   ----------------------------------------------------------------------
   Alle Spielkoordinaten leben im Koordinatensystem der Karte
   (viewBox 0 0 9627.4 5415.4). Umrechnung Bildschirm ⇄ Karte über die CTM.
   ====================================================================== */
function clientToMap(cx, cy) {
  const m = mapSvg.getScreenCTM();
  if (!m) return { x: 0, y: 0 };
  const p = mapSvg.createSVGPoint();
  p.x = cx; p.y = cy;
  const r = p.matrixTransform(m.inverse());
  return { x: r.x, y: r.y };
}
function mapToClient(x, y) {
  const m = mapSvg.getScreenCTM();
  if (!m) return { x: 0, y: 0 };
  const p = mapSvg.createSVGPoint();
  p.x = x; p.y = y;
  const r = p.matrixTransform(m);
  return { x: r.x, y: r.y };
}
/* Bildschirm-Pixel pro Karteneinheit (für Treffer-Radien) */
function mapScale() {
  const m = mapSvg.getScreenCTM();
  return m ? m.a : 0.16;
}

/* Land-Pfade je Kontinent + Seen, werden bei Init indiziert */
const continentPaths = { blue: [], magenta: [], coral: [], green: [] };
let lakePaths = [];
let testSvgPoint = null; // wiederverwendeter SVGPoint für isPointInFill

function indexMapPaths() {
  testSvgPoint = mapSvg.createSVGPoint();
  document.querySelectorAll("#Land path").forEach((p) => {
    const cls = (p.getAttribute("class") || "").split(/\s+/);
    for (const [cid, def] of Object.entries(CONTINENTS)) {
      if (def.classes.some((c) => cls.includes(c))) { continentPaths[cid].push(p); break; }
    }
  });
  lakePaths = [...document.querySelectorAll("#Gewässer path")];
}

/* Liefert die Kontinent-ID an Position (x,y) oder null (Wasser/See). */
function continentAt(x, y) {
  const pt = testSvgPoint;
  pt.x = x; pt.y = y;
  for (const lake of lakePaths) if (lake.isPointInFill(pt)) return null;
  for (const [cid, paths] of Object.entries(continentPaths)) {
    for (const p of paths) if (p.isPointInFill(pt)) return cid;
  }
  return null;
}

/* Vorberechnete gültige Spawn-Positionen je Kontinent (einmalig bei Init).
   Punkte liegen sicher im Landesinneren (Küstenabstand wird mitgeprüft). */
const spawnPools = { blue: [], magenta: [], coral: [], green: [] };
function buildSpawnPools() {
  const MARGIN = 150; // Mindestabstand zur Küste
  for (const [cid, paths] of Object.entries(continentPaths)) {
    const entries = paths
      .map((p) => ({ p, b: p.getBBox() }))
      .filter((e) => e.b.width > 300 && e.b.height > 300); // Mini-Inseln auslassen
    if (!entries.length) continue;
    const totalArea = entries.reduce((s, e) => s + e.b.width * e.b.height, 0);
    let guard = 5000;
    while (spawnPools[cid].length < 130 && guard-- > 0) {
      // Pfad flächengewichtet wählen, Punkt in dessen BBox würfeln
      let r = Math.random() * totalArea, entry = entries[0];
      for (const e of entries) { r -= e.b.width * e.b.height; if (r <= 0) { entry = e; break; } }
      const x = entry.b.x + Math.random() * entry.b.width;
      const y = entry.b.y + Math.random() * entry.b.height;
      if (continentAt(x, y) !== cid) continue;
      // Küstenabstand: vier Nachbarpunkte müssen auch auf dem Kontinent liegen
      if (continentAt(x + MARGIN, y) !== cid || continentAt(x - MARGIN, y) !== cid ||
          continentAt(x, y + MARGIN) !== cid || continentAt(x, y - MARGIN) !== cid) continue;
      spawnPools[cid].push({ x, y });
    }
  }
}

/* Schmale Quer-Geräte (Smartphone im Querformat): UI wandert an die Seiten —
   HUD links als Spalte, Linienmenü rechts als Spalte (siehe CSS-Media-Query). */
const verticalUIQuery = window.matchMedia("(orientation: landscape) and (max-height: 540px)");
const isVerticalUI = () => verticalUIQuery.matches;

/* Aktuell sichtbarer Kartenausschnitt (bei "slice" wird ja beschnitten),
   abzüglich der tatsächlichen UI-Flächen, damit nichts verdeckt spawnt.
   Funktioniert für beide Layouts (UI oben/unten oder links/rechts). */
function visibleMapRect() {
  const w = window.innerWidth, h = window.innerHeight;
  let top = 24, bottom = 24, left = 64, right = 80;
  if (!hud.classList.contains("hidden")) {
    const r = hud.getBoundingClientRect();
    if (isVerticalUI()) left = Math.max(left, r.right + 24);
    else top = Math.max(top, r.bottom + 24);
  }
  if (!lineMenu.classList.contains("hidden")) {
    const r = lineMenu.getBoundingClientRect();
    if (isVerticalUI()) right = Math.max(right, w - r.left + 24);
    else bottom = Math.max(bottom, h - r.top + 44); // +Platz für das Dock-Label darüber
  }
  const tl = clientToMap(left, top);
  const br = clientToMap(w - right, h - bottom);
  return { x1: tl.x, y1: tl.y, x2: br.x, y2: br.y };
}
const inRect = (p, r) => p.x > r.x1 && p.x < r.x2 && p.y > r.y1 && p.y < r.y2;

/* Sucht eine gültige Spawn-Position auf einem Kontinent: sichtbar, mit
   Mindestabstand zu bestehenden Stationen (wird notfalls gelockert). */
function pickSpawnPos(cid, minDist = BALANCE.minStationDist) {
  const rect = visibleMapRect();
  for (const d of [minDist, minDist * 0.7, minDist * 0.45, 0]) {
    const candidates = spawnPools[cid].filter((p) =>
      inRect(p, rect) && state.stations.every((s) => dist(s, p) > d));
    if (candidates.length) return randOf(candidates);
  }
  return randOf(spawnPools[cid]) || { x: MAP_W / 2, y: MAP_H / 2 }; // letzter Ausweg
}

/* Kontinentwahl für automatische Spawns: bevorzugter Kontinent (Spielerklick)
   oder ausgewogen (Kontinente mit wenigen Stationen zuerst). */
function chooseContinent() {
  if (state.preferredContinent) return state.preferredContinent;
  const counts = {};
  for (const cid of LINE_IDS) counts[cid] = 0;
  for (const s of state.stations) counts[s.continent]++;
  const min = Math.min(...Object.values(counts));
  return randOf(LINE_IDS.filter((cid) => counts[cid] === min));
}

/* ====================================================================== [4]
   SPIELZUSTAND & RESET
   ====================================================================== */
const state = { screen: "start", demo: false, running: false, bubbles: [] };

/* Tutorial-Zustände: jeder Hinweis erscheint genau einmal pro Runde */
function freshTutorialState() {
  return {
    firstStationShown: false,
    secondStationShown: false,
    lineMenuShown: false,
    firstConnectionBuilt: false,
    firstTransportShown: false,
    newPointShown: false,
    congestionShown: false,
    freeStationShown: false,
    firstWildPointShown: false,
    influenceLowShown: false,
    wrongLineShown: false,
    strandedShown: false,
  };
}

/* Setzt den kompletten Rundenzustand zurück (Daten + DOM). */
function resetRound() {
  clearAllTimers();

  for (const g of [gConnections, gGhost, gPoints, gStations, gFx]) g.replaceChildren();
  bubbleLayer.replaceChildren();
  toastLayer.replaceChildren();
  fxHtmlLayer.replaceChildren();
  costChip.style.display = "none";
  $("flash").classList.remove("on");

  Object.assign(state, {
    running: false,
    time: 0,
    timeLeft: BALANCE.gameDuration,
    stability: BALANCE.stabilityStart,
    influence: BALANCE.influenceStart,
    stations: [],
    connections: [],
    points: [],
    idCounter: 1,
    stationCount: 0,
    stationTimer: 0,             // Countdown bis zur nächsten Dock-Station (ab Station 5)
    placedBeyondAuto: 0,         // wie viele Stationen nach den ersten vier kamen
    pointTimer: BALANCE.firstPointDelay,
    activeLine: "blue",          // wird beim Spawn der ersten Station überschrieben
    preferredContinent: null,
    offer: null,                 // aktuelle frei platzierbare Station (Dock)
    firstOfferUsed: false,       // erstes Angebot bekommt mehr Zeit + Hüpf-Animation
    drag: null,                  // aktiver Drag (Linie oder Station)
    selectedStation: null,       // Tipp-Tipp-Bau: erste angewählte Station
    tapCandidate: null,          // möglicher Kontinent-Klick
    tutorial: freshTutorialState(),
    nameDeck: shuffledNames(),
    botTimer: 1.5,
    bubbles: [],
  });

  setDockIdle();
  clearSelectRing();
  $("departureBoard").classList.add("collapsed");
  $("boardList").replaceChildren();
  updateHud();
  renderLineMenu();
}

function shuffledNames() {
  const deck = [...T.stations];
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  return deck;
}
function nextStationName() {
  if (!state.nameDeck.length) state.nameDeck = shuffledNames(); // Notfall: Namen wiederverwenden
  return state.nameDeck.pop();
}

/* ====================================================================== [5]
   SCREEN-VERWALTUNG — genau ein Screen ist aktiv, keine Überlagerungs-Reste
   ====================================================================== */
function showScreen(name) {
  state.screen = name;
  $("screen-start").classList.toggle("hidden", name !== "start");
  $("screen-end").classList.toggle("hidden", name !== "end");
  $("screen-info").classList.add("hidden"); // Info-Overlay schließt bei jedem Wechsel
  const inGame = name === "game";
  hud.classList.toggle("hidden", !inGame);
  lineMenu.classList.toggle("hidden", !inGame); // das Dock hängt im Menü und verschwindet mit
  $("departureBoard").classList.toggle("hidden", !inGame);
}

/* ====================================================================== [6]
   SPIELSTART / SPIELENDE
   ====================================================================== */
function startGame(demo) {
  state.demo = !!demo;
  resetRound();
  state.running = true;
  showScreen("game");
  setDemoVisuals(state.demo);
  // Die erste Station erscheint sofort (stationSchedule[0] = 0) im Haupt-Loop.
}

/* Zurück zum Startscreen — stoppt alles und räumt vollständig auf. */
function resetToStart() {
  state.demo = false;
  setDemoVisuals(false);
  resetRound();
  showScreen("start");
}

/* DIE einzige endGame-Funktion. Im Demo-Modus wird stattdessen
   nahtlos eine neue Runde gestartet (nie ein Endscreen). */
function endGame(won) {
  if (!state.running) return;
  if (state.demo) { demoSoftRestart(); return; }
  state.running = false;

  const stab = Math.max(0, Math.round(state.stability));
  const card = $("endCard");
  card.classList.remove("win", "lose", "no-image");
  card.classList.add(won ? "win" : "lose");

  $("endTitle").textContent = won ? T.end.winTitle : T.end.loseTitle;
  $("endStability").textContent = T.end.stabilityResult.replace("{WERT}", stab);
  $("endText").textContent = won ? winTextFor(stab) : T.end.loseText;
  $("endEventMsg").textContent = T.end.eventMessage;

  // Bild laden; falls nicht vorhanden → Platzhalterfläche
  const img = $("endImage");
  img.onerror = () => card.classList.add("no-image");
  drawEndPlaceholder(won);
  img.src = won ? "images/gewonnen.jpg" : "images/verloren.jpg";

  showScreen("end");
}

function winTextFor(stab) {
  for (const row of T.end.winByStability) if (stab >= row.min) return row.text;
  return T.end.winByStability[T.end.winByStability.length - 1].text;
}

/* Einfache Platzhaltergrafik (Haken/Kreuz), falls die JPGs fehlen */
function drawEndPlaceholder(won) {
  const svg = $("endPlaceholderSvg");
  svg.replaceChildren();
  svg.appendChild(svgEl("path", {
    d: won ? "M20 52 L42 74 L82 28" : "M28 28 L72 72 M72 28 L28 72",
    fill: "none", stroke: "#fff", "stroke-width": "10",
    "stroke-linecap": "round", "stroke-linejoin": "round",
  }));
}

/* ====================================================================== [7]
   HAUPT-LOOP — eine zentrale Schleife treibt das gesamte Spiel
   ====================================================================== */
let lastFrame = performance.now();

function loop(now) {
  const dt = Math.min(0.1, (now - lastFrame) / 1000); // Tab-Wechsel: keine Zeitsprünge
  lastFrame = now;

  checkIdle(now);

  if (state.running) {
    state.time += dt;
    state.timeLeft = Math.max(0, BALANCE.gameDuration - state.time);

    updateStationSpawns(dt);
    updateOffer(dt);
    updatePointSpawns(dt);
    updatePoints(dt);
    updateStability(dt);
    if (state.demo && state.running) demoBotTick(dt);
    updateHud();

    // Abfahrtstafel ~4× pro Sekunde aktualisieren (nur wenn ausgeklappt)
    state.boardTimer = (state.boardTimer ?? 0) - dt;
    if (state.boardTimer <= 0 && !$("departureBoard").classList.contains("collapsed")) {
      state.boardTimer = 0.25;
      renderBoard();
    }

    if (state.running && state.timeLeft <= 0) endGame(state.stability > 0);
  }

  layoutBubbles(); // kartenverankerte Blasen folgen der Karte (Resize-sicher)
  requestAnimationFrame(loop);
}

/* ====================================================================== [8]
   STATIONEN — Spawns, Rendering, frei platzierbare Station
   ====================================================================== */

/* Zeitsteuerung: erst vier automatische Stationen, danach Dock-Angebote. */
function updateStationSpawns(dt) {
  const sched = BALANCE.stationSchedule;
  if (state.stationCount < sched.length) {
    if (state.time >= sched[state.stationCount]) spawnAutoStation();
    return;
  }
  if (state.offer || state.drag?.type === "station") return; // nur ein Angebot zur Zeit
  state.stationTimer -= dt;
  if (state.stationTimer <= 0) {
    if (state.demo) demoPlaceStation();
    else createOffer();
  }
}

function nextStationInterval() {
  return Math.max(
    BALANCE.stationIntervalMin,
    BALANCE.stationInterval * Math.pow(BALANCE.stationIntervalDecay, state.placedBeyondAuto)
  );
}

/* Kontinentwahl der ersten Stationen ist didaktisch gesteuert:
   Nr. 2 = gleicher Kontinent wie Nr. 1 (erste Verbindung ist einfach),
   Nr. 3 = bewusst ein anderer (führt den Linienwechsel ein). */
function spawnAutoStation() {
  let cid;
  const n = state.stationCount;
  if (state.preferredContinent) cid = state.preferredContinent;
  else if (n === 1 && state.stations[0]) cid = state.stations[0].continent;
  else if (n === 2 && state.stations[0]) cid = randOf(LINE_IDS.filter((c) => c !== state.stations[0].continent));
  else cid = chooseContinent();
  const pos = pickSpawnPos(cid);
  createStation(pos.x, pos.y, cid);
}

function createStation(x, y, cid) {
  const st = {
    id: state.idCounter++,
    x, y,
    continent: cid,
    name: nextStationName().name,
    conns: [],
    waiting: [],
    el: null, warnEl: null,
  };
  state.stations.push(st);
  state.stationCount++;
  state.preferredContinent = null; // Präferenz gilt für genau einen Spawn
  renderStation(st);
  pulseAt(x, y, 200, LINES[cid].color);

  // Spawn-Timer für das nächste Angebot sauber neu aufziehen
  state.stationTimer = nextStationInterval();

  /* --- Tutorial-Momente --- */
  const tut = state.tutorial;
  if (state.stationCount === 1) {
    state.activeLine = cid;          // aktive Startlinie passt zur ersten Station
    renderLineMenu();
    if (!tut.firstStationShown) {
      tut.firstStationShown = true;
      showBubble({ map: st, text: T.tutorial.firstStation.replace("{FARBE}", T.ui.continentAdjectives[cid]), ttl: 6 });
    }
  } else if (state.stationCount === 2 && !tut.secondStationShown) {
    tut.secondStationShown = true;
    const needsSwitch = cid !== state.activeLine;
    showBubble({ map: st, text: needsSwitch ? T.tutorial.secondStationSwitch : T.tutorial.secondStation, ttl: 6 });
    // Falls nach 7 s noch keine Linie gebaut wurde: Zieh-Hinweis zwischen die Stationen
    after(7, () => {
      if (state.running && !state.tutorial.firstConnectionBuilt && state.stations.length >= 2) {
        const a = state.stations[0], b = state.stations[1];
        showBubble({ map: { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 }, text: T.tutorial.drawLine, ttl: 7 });
      }
    });
  }
  // Linienmenü-Hinweis, sobald eine Station eine andere Farbe verlangt
  if (state.stationCount >= 2 && cid !== state.activeLine && !tut.lineMenuShown) {
    tut.lineMenuShown = true;
    showBubble({ anchor: "lineMenu", text: T.tutorial.lineMenu, ttl: 6 });
    pulseLineButton(cid);
  }
  return st;
}

/* --- Stations-Rendering -------------------------------------------------
   Kleine Stationen: weißer Punkt mit Kontinent-Akzentring.
   Umsteigepunkte (mehrere Linienfarben): weiße Pillenform mit dunkler
   Kreisfläche dahinter — angelehnt an die Stilreferenz. */
function renderStation(st) {
  const g = svgEl("g", { class: "station-group", transform: `translate(${st.x},${st.y})` });
  const pop = svgEl("g", { class: st.el ? "" : "pop" }); // Pop-Animation nur beim ersten Aufbau

  const lineColors = new Set(st.conns.map((c) => c.line));
  const isHub = lineColors.size >= 2 || st.conns.length >= 3;

  pop.appendChild(svgEl("circle", { class: "station-halo", r: isHub ? 150 : 95 }));

  let shape;
  if (isHub) {
    const w = 230 + (st.conns.length > 3 ? 40 : 0);
    shape = svgEl("rect", {
      class: "station-shape", x: -w / 2, y: -55, width: w, height: 110, rx: 55,
      stroke: LINES[st.continent].color,
    });
  } else {
    shape = svgEl("circle", { class: "station-shape", r: 62, stroke: LINES[st.continent].color });
  }
  pop.appendChild(shape);
  g.appendChild(pop);

  // Warnring (unsichtbar, bis Stau entsteht)
  const warn = svgEl("circle", { class: "warn-ring", r: isHub ? 190 : 130, style: "display:none" });
  g.appendChild(warn);

  // Stationsname (ruhig, klein, gut lesbar)
  const label = svgEl("text", { class: "station-label", y: isHub ? 230 : 190 });
  label.textContent = st.name;
  g.appendChild(label);

  if (st.el) st.el.remove();
  st.el = g; st.warnEl = warn;
  gStations.appendChild(g);
  updateStationWarn(st);
  layoutWaiting(st);
}

/* Wartende Punkte fächerförmig um die Station anordnen */
function layoutWaiting(st) {
  st.waiting.forEach((p, i) => {
    const angle = -Math.PI / 2 + i * 0.75;
    p.x = st.x + Math.cos(angle) * 140;
    p.y = st.y + Math.sin(angle) * 140;
    if (p.el) p.el.setAttribute("transform", `translate(${p.x},${p.y})`);
  });
}

/* Warnstufen (Stau) aktualisieren */
function updateStationWarn(st) {
  const n = st.waiting.length;
  if (n >= BALANCE.overloadThreshold) {
    st.warnEl.style.display = "";
    st.warnEl.setAttribute("class", "warn-ring " + (n >= 3 ? "lvl2" : "lvl1"));
  } else {
    st.warnEl.style.display = "none";
  }
}

/* --- Frei platzierbare Station (Dock im Linienmenü) --------------------- */

/* Ausgegrauter Ruhezustand: Bereich bleibt sichtbar, ist aber inaktiv */
function setDockIdle() {
  dock.classList.remove("active", "first");
  $("dockDotWrap").classList.remove("warn");
  $("dockRing").querySelector(".left").setAttribute("stroke-dashoffset", "100");
  $("dockName").textContent = T.ui.dockIdle;
  $("dockTimer").textContent = " "; // Platzhalter, damit die Höhe stabil bleibt
}

function createOffer() {
  const def = nextStationName();
  // Das allererste Angebot bekommt ein längeres Zeitfenster und hüpft auffällig
  const isFirst = !state.firstOfferUsed;
  state.firstOfferUsed = true;
  const window_ = isFirst ? BALANCE.grabWindowFirst : BALANCE.grabWindow;
  state.offer = { name: def.name, t: window_, window: window_, grabbed: false };
  $("dockName").textContent = def.name;
  $("dockDotWrap").classList.remove("warn");
  $("dockRing").querySelector(".left").setAttribute("stroke-dashoffset", "0");
  dock.classList.add("active");
  dock.classList.toggle("first", isFirst);

  if (!state.tutorial.freeStationShown) {
    state.tutorial.freeStationShown = true;
    showBubble({ anchor: "dock", text: T.tutorial.freeStation, ttl: 7 });
  }
}

function updateOffer(dt) {
  const offer = state.offer;
  if (!offer || offer.grabbed) return;
  offer.t -= dt;
  // Countdown-Ring + Zahl aktualisieren; letzte Sekunde: Warnfarbe + stärkerer Puls
  const frac = clamp(offer.t / offer.window, 0, 1);
  $("dockRing").querySelector(".left").setAttribute("stroke-dashoffset", String(100 * (1 - frac)));
  $("dockTimer").textContent = Math.max(0, offer.t).toFixed(1).replace(".", ",") + " s";
  $("dockDotWrap").classList.toggle("warn", offer.t <= 1);
  if (offer.t <= 0) autoPlaceOffer();
}

/* Dot nicht gegriffen → Station erscheint automatisch an gültiger Position */
function autoPlaceOffer() {
  if (!state.offer) return;
  const cid = state.preferredContinent || chooseContinent();
  const pos = pickSpawnPos(cid);
  finishOfferPlacement(pos.x, pos.y, cid, true);
}

/* Gemeinsamer Abschluss für Drop & Auto-Platzierung */
function finishOfferPlacement(x, y, cid, wasAuto) {
  state.offer = null;
  setDockIdle();
  state.placedBeyondAuto++;
  const st = createStation(x, y, cid);
  if (wasAuto && !state.demo) showToast(T.ui.autoPlacedToast);
  pickupWildNearStation(st);
  return st;
}

/* ====================================================================== [9]
   VERBINDUNGEN / LINIENBAU
   ====================================================================== */

/* Octilineare Route (45°-Diagonale + gerades Stück) zwischen zwei Punkten */
function octiRoute(x1, y1, x2, y2) {
  const dx = x2 - x1, dy = y2 - y1;
  const adx = Math.abs(dx), ady = Math.abs(dy);
  const sx = Math.sign(dx) || 1, sy = Math.sign(dy) || 1;
  if (Math.min(adx, ady) < 60 || Math.abs(adx - ady) < 60) {
    return [{ x: x1, y: y1 }, { x: x2, y: y2 }]; // fast gerade/diagonal → direkte Linie
  }
  const corner = adx > ady
    ? { x: x1 + sx * ady, y: y2 }   // erst 45°-Diagonale, dann horizontal
    : { x: x2, y: y1 + sy * adx };  // erst 45°-Diagonale, dann vertikal
  return [{ x: x1, y: y1 }, corner, { x: x2, y: y2 }];
}

/* Pfad-String mit abgerundeter Ecke; optional parallel versetzt */
function routePathD(pts, offset = 0) {
  let p = pts;
  if (offset !== 0) {
    // gesamte Route senkrecht zur Verbindungsachse verschieben (Parallelgleise)
    const a = pts[0], b = pts[pts.length - 1];
    const len = dist(a, b) || 1;
    const nx = -(b.y - a.y) / len, ny = (b.x - a.x) / len;
    p = pts.map((q) => ({ x: q.x + nx * offset, y: q.y + ny * offset }));
  }
  if (p.length === 2) return `M${p[0].x},${p[0].y} L${p[1].x},${p[1].y}`;
  const [a, c, b] = p;
  const r = Math.min(110, dist(a, c) / 2, dist(c, b) / 2);
  const d1 = dist(a, c) || 1, d2 = dist(c, b) || 1;
  const p1 = { x: c.x + (a.x - c.x) * (r / d1), y: c.y + (a.y - c.y) * (r / d1) };
  const p2 = { x: c.x + (b.x - c.x) * (r / d2), y: c.y + (b.y - c.y) * (r / d2) };
  return `M${a.x},${a.y} L${p1.x},${p1.y} Q${c.x},${c.y} ${p2.x},${p2.y} L${b.x},${b.y}`;
}

function routeLength(pts) {
  let l = 0;
  for (let i = 1; i < pts.length; i++) l += dist(pts[i - 1], pts[i]);
  return l;
}

/* Kosten je nach Länge: linear von costMin bis costMax */
function connectionCost(length) {
  const f = clamp(length / BALANCE.costRefLength, 0, 1);
  return Math.round(BALANCE.costMin + f * (BALANCE.costMax - BALANCE.costMin));
}

/* Verbindung bauen — Spieler UND Demo-Bot nutzen denselben Weg.
   Gibt das Connection-Objekt zurück oder false. */
function tryBuildConnection(a, b, lineId, opts = {}) {
  if (!a || !b || a === b) return false;
  // exakte Duplikate (gleiches Paar, gleiche Linie) verhindern
  if (state.connections.some((c) => c.line === lineId &&
      ((c.a === a && c.b === b) || (c.a === b && c.b === a)))) {
    if (!state.demo && !opts.silent) showToast(T.ui.duplicateToast);
    return false;
  }
  const pts = octiRoute(a.x, a.y, b.x, b.y);
  const cost = connectionCost(routeLength(pts));
  if (state.influence < cost) {
    if (!state.demo && !opts.silent) {
      showToast(T.errors.noInfluence, true);
      flashInfluence();
    }
    return false;
  }
  changeInfluence(-cost);
  floatTextAtClient((a.x + b.x) / 2, (a.y + b.y) / 2, `−${cost}`);

  // Parallele Verbindungen leicht versetzen (Netzplan-Optik)
  const parallelCount = state.connections.filter((c) =>
    (c.a === a && c.b === b) || (c.a === b && c.b === a)).length;
  const offset = parallelCount === 0 ? 0
    : (parallelCount % 2 === 1 ? 1 : -1) * Math.ceil(parallelCount / 2) * 64;

  const el = svgEl("path", {
    class: "connection", d: routePathD(pts, offset),
    stroke: LINES[lineId].color, "stroke-width": 44,
  });
  gConnections.appendChild(el);

  // Einbau-Animation: Linie "zeichnet sich selbst"
  const total = el.getTotalLength();
  el.setAttribute("stroke-dasharray", total);
  el.setAttribute("stroke-dashoffset", total);
  requestAnimationFrame(() => {
    el.classList.add("reveal");
    el.setAttribute("stroke-dashoffset", "0");
    after(0.55, () => { el.removeAttribute("stroke-dasharray"); el.classList.remove("reveal"); });
  });

  const conn = { id: state.idCounter++, a, b, line: lineId, el, length: total, samples: samplePath(el) };
  state.connections.push(conn);
  a.conns.push(conn); b.conns.push(conn);
  renderStation(a); renderStation(b); // ggf. zu Umsteigepunkten aufwerten

  state.tutorial.firstConnectionBuilt = true;
  pickupWildNearLine(conn);
  return conn;
}

/* Punkte entlang des Pfads für Abstandsprüfungen (freie Punkte aufsammeln) */
function samplePath(el) {
  const total = el.getTotalLength(), out = [];
  for (let d = 0; d <= total; d += 120) {
    const p = el.getPointAtLength(d);
    out.push({ x: p.x, y: p.y });
  }
  return out;
}

/* --- Linienmenü --------------------------------------------------------- */
function renderLineMenu() {
  const buttons = LINE_IDS.map((lid) => {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "line-btn" + (state.activeLine === lid ? " active" : "");
    btn.dataset.line = lid;
    btn.style.setProperty("--btnColor", LINES[lid].color); // für den Glow beim Hüpfen
    btn.innerHTML = `<span class="dot" style="background:${LINES[lid].color}"></span><span class="label">${T.ui.lineNames[lid]}</span>`;
    btn.addEventListener("click", () => setActiveLine(lid));
    return btn;
  });
  // Das Dock-Element (samt Label/Pfeil darin) bleibt erhalten (Drag-Listener!)
  const mid = Math.ceil(buttons.length / 2);
  lineMenu.replaceChildren(...buttons.slice(0, mid), dock, ...buttons.slice(mid));
}
function setActiveLine(lid) {
  state.activeLine = lid;
  lineMenu.querySelectorAll(".line-btn").forEach((b) => {
    b.classList.toggle("active", b.dataset.line === lid);
    b.classList.remove("jump");
  });
  lineMenu.classList.remove("attention");
}
/* Erster Farbwechsel-Moment: passenden Button hüpfen lassen (wie das Dock) */
function pulseLineButton(lid) {
  lineMenu.classList.add("attention");
  lineMenu.querySelectorAll(".line-btn").forEach((b) =>
    b.classList.toggle("jump", b.dataset.line === lid));
  after(8, () => {
    lineMenu.classList.remove("attention");
    lineMenu.querySelectorAll(".line-btn").forEach((b) => b.classList.remove("jump"));
  });
}

/* ====================================================================== [10]
   ANLIEGEN / PUNKTE
   ====================================================================== */

/* Spawn-Takt: wird alle 15 s schneller */
function currentPointInterval() {
  const steps = Math.floor(state.time / BALANCE.pointSpawnAccelEvery);
  return Math.max(BALANCE.pointSpawnMin, BALANCE.pointSpawnStart * Math.pow(BALANCE.pointSpawnAccel, steps));
}

function updatePointSpawns(dt) {
  if (state.stations.length < 2) return;          // erst ab zwei Stationen
  if (state.points.length >= BALANCE.maxPointsTotal) return;
  state.pointTimer -= dt;
  if (state.pointTimer > 0) return;
  state.pointTimer = currentPointInterval();

  // Ab Minute 1: ~10 % freie Punkte (max. einer pro Kontinent gleichzeitig)
  if (state.time >= BALANCE.wildFrom && Math.random() < BALANCE.wildChance) {
    if (spawnWildPoint()) return;
  }
  spawnStationPoint();
}

function spawnStationPoint() {
  const candidates = state.stations.filter((s) => s.waiting.length < BALANCE.maxWaitingPerStation);
  if (!candidates.length) return;
  // Stationen mit wenigen wartenden Punkten bevorzugen (kein Todesspiral-Stau)
  const weighted = [];
  for (const s of candidates) {
    for (let i = 0; i <= BALANCE.maxWaitingPerStation - s.waiting.length; i++) weighted.push(s);
  }
  const st = randOf(weighted);

  // Farbe: meist Kontinentfarbe der Station, später gelegentlich eine fremde
  let color = st.continent;
  if (state.time >= BALANCE.lateColorFrom && Math.random() < BALANCE.lateColorChance) {
    color = randOf(LINE_IDS.filter((c) => c !== st.continent));
  }

  const p = {
    id: state.idCounter++, kind: "waiting",
    color, station: st, wait: 0, x: st.x, y: st.y, el: null,
  };
  state.points.push(p);
  st.waiting.push(p);
  renderPoint(p);
  layoutWaiting(st);
  updateStationWarn(st);
  pulseAt(st.x, st.y, 170, LINES[color].color); // Spawn-Aufmerksamkeit: Ring an der Station

  const tut = state.tutorial;
  if (!tut.newPointShown) {
    tut.newPointShown = true;
    showBubble({ map: st, text: T.tutorial.newPoint, ttl: 5 });
  } else if (st.waiting.length >= BALANCE.overloadThreshold && !tut.congestionShown) {
    tut.congestionShown = true;
    showBubble({ map: st, text: T.tutorial.congestion, ttl: 5 });
  }
}

/* Freier Punkt auf einem Kontinent — Farbe = Kontinent, auf dem er liegt */
function spawnWildPoint() {
  const occupied = new Set(state.points.filter((p) => p.kind === "wild").map((p) => p.continent));
  const freeCids = LINE_IDS.filter((cid) => !occupied.has(cid));
  if (!freeCids.length) return false;
  const cid = randOf(freeCids);
  const rect = visibleMapRect();
  const candidates = spawnPools[cid].filter((p) =>
    inRect(p, rect) && state.stations.every((s) => dist(s, p) > BALANCE.wildMinStationDist));
  if (!candidates.length) return false;
  const pos = randOf(candidates);

  const p = {
    id: state.idCounter++, kind: "wild",
    color: cid, continent: cid, age: 0, x: pos.x, y: pos.y, el: null,
  };
  state.points.push(p);
  renderPoint(p);
  pulseAt(pos.x, pos.y, 260, LINES[cid].color);

  if (!state.tutorial.firstWildPointShown) {
    state.tutorial.firstWildPointShown = true;
    showBubble({ map: pos, text: T.tutorial.wildPoint, ttl: 7 });
  }
  return true;
}

/* --- Punkt-Rendering ---------------------------------------------------- */
function renderPoint(p) {
  const g = svgEl("g", { transform: `translate(${p.x},${p.y})` });
  if (p.kind === "wild") {
    // pulsierender Umgebungsradius + "Neu"-Markierung: darf nicht wie Deko wirken
    g.appendChild(svgEl("circle", { class: "wild-aura", r: 130, stroke: LINES[p.color].color }));
    const tag = svgEl("text", { class: "wild-tag", y: -160 });
    tag.textContent = "Neu";
    g.appendChild(tag);
  }
  const dot = svgEl("circle", {
    class: "point-dot spawn", r: p.kind === "wild" ? 56 : 44,
    fill: LINES[p.color].color,
  });
  g.appendChild(dot);
  p.el = g; p.dotEl = dot;
  gPoints.appendChild(g);
  after(1.8, () => dot.classList.remove("spawn"));
}

/* --- Punkt-Logik je Frame ------------------------------------------------ */
function updatePoints(dt) {
  for (const p of [...state.points]) {
    if (p.kind === "waiting") updateWaitingPoint(p, dt);
    else if (p.kind === "travel") updateTravelPoint(p, dt);
    else if (p.kind === "wild") p.age += dt;
    else if (p.kind === "transfer") updateTransferPoint(p, dt);
  }
}

function updateWaitingPoint(p, dt) {
  p.wait += dt;
  if (p.wait < BALANCE.boardDelay) return;
  const st = p.station;
  const matching = st.conns.filter((c) => c.line === p.color);
  if (matching.length) {
    boardPoint(p, randOf(matching), true);
  } else if (st.conns.length && p.wait >= BALANCE.wrongBoardAfter && !state.demo) {
    // Keine passende Linie vorhanden → Punkt nimmt notfalls die falsche (Lernmoment)
    boardPoint(p, randOf(st.conns), false);
  } else if (!st.conns.length && p.wait > 4 && !state.tutorial.strandedShown) {
    state.tutorial.strandedShown = true;
    showBubble({ map: st, text: T.errors.stranded, ttl: 6, error: true });
  }
}

function boardPoint(p, conn, correct) {
  const st = p.station;
  st.waiting = st.waiting.filter((q) => q !== p);
  layoutWaiting(st);
  updateStationWarn(st);

  p.kind = "travel";
  p.conn = conn;
  p.forward = conn.a === st;  // Fahrtrichtung entlang des Pfads
  p.dist = 0;
  p.correct = correct;
  p.station = null;

  if (!correct) {
    // SOFORT-Feedback: -10 %, roter Flash, Hinweis + rot blinkende Linie
    changeStability(-BALANCE.penaltyWrongLine);
    flashRed();
    p.dotEl.classList.add("bad");
    conn.el.classList.remove("bad");
    void conn.el.getBoundingClientRect(); // Animation neu anstoßen
    conn.el.classList.add("bad");
    const mid = conn.el.getPointAtLength(conn.length / 2);
    const first = !state.tutorial.wrongLineShown;
    state.tutorial.wrongLineShown = true;
    showBubble({ map: mid, text: first ? T.errors.wrongLine : T.errors.wrongLineShort, ttl: first ? 6 : 4, error: true });
  } else if (!state.tutorial.firstTransportShown) {
    state.tutorial.firstTransportShown = true;
    const mid = conn.el.getPointAtLength(conn.length / 2);
    showBubble({ map: mid, text: T.tutorial.firstTransport, ttl: 6.5 });
  }
}

function updateTravelPoint(p, dt) {
  p.dist += BALANCE.pointSpeed * dt;
  const d = clamp(p.forward ? p.dist : p.conn.length - p.dist, 0, p.conn.length);
  const pos = p.conn.el.getPointAtLength(d);
  p.x = pos.x; p.y = pos.y;
  p.el.setAttribute("transform", `translate(${pos.x},${pos.y})`);
  if (p.dist >= p.conn.length) arrivePoint(p);
}

function arrivePoint(p) {
  const dest = p.forward ? p.conn.b : p.conn.a;
  if (p.correct) {
    changeStability(BALANCE.rewardStability);
    changeInfluence(BALANCE.rewardInfluence);
    rippleAt(dest.x, dest.y);
    floatTextAtClient(dest.x, dest.y, `+${BALANCE.rewardStability} %`);
  }
  removePoint(p);
}

/* Übergang freier Punkt → Station (kurzer Flug zum Aufnahmeort) */
function startTransfer(p, st) {
  if (p.kind !== "wild") return;
  p.kind = "transfer";
  p.from = { x: p.x, y: p.y };
  p.to = st;
  p.t = 0;
  p.el.querySelectorAll(".wild-aura, .wild-tag").forEach((n) => n.remove()); // Highlight entfernen
}

function updateTransferPoint(p, dt) {
  p.t += dt * 2.2; // ≈ 0,45 s Flugzeit
  const k = clamp(p.t, 0, 1), e = 1 - Math.pow(1 - k, 2);
  p.x = p.from.x + (p.to.x - p.from.x) * e;
  p.y = p.from.y + (p.to.y - p.from.y) * e;
  p.el.setAttribute("transform", `translate(${p.x},${p.y})`);
  if (k >= 1) {
    p.kind = "waiting";
    p.station = p.to;
    p.wait = 0;
    p.to.waiting.push(p);
    layoutWaiting(p.to);
    updateStationWarn(p.to);
  }
}

function removePoint(p) {
  state.points = state.points.filter((q) => q !== p);
  if (p.station) {
    p.station.waiting = p.station.waiting.filter((q) => q !== p);
    layoutWaiting(p.station);
    updateStationWarn(p.station);
  }
  if (p.el) p.el.remove();
}

/* --- Freie Punkte aufsammeln --------------------------------------------- */
function pickupWildNearStation(st) {
  for (const p of state.points) {
    if (p.kind === "wild" && dist(p, st) < BALANCE.pickupRadiusStation) startTransfer(p, st);
  }
}
function pickupWildNearLine(conn) {
  for (const p of state.points) {
    if (p.kind !== "wild") continue;
    const near = conn.samples.some((s) => dist(p, s) < BALANCE.pickupRadiusLine);
    if (near) startTransfer(p, dist(p, conn.a) < dist(p, conn.b) ? conn.a : conn.b);
  }
}

/* ====================================================================== [11]
   STABILITÄT & EINFLUSS
   ====================================================================== */
function updateStability(dt) {
  let drain = 0;

  for (const st of state.stations) {
    // Überlastung: ab 2 wartenden Punkten
    if (st.waiting.length >= BALANCE.overloadThreshold) drain += BALANCE.overloadDrain;
    // Gestrandet: wartende Punkte an Stationen ganz ohne Verbindung
    if (!st.conns.length) {
      for (const p of st.waiting) {
        if (p.wait > BALANCE.strandedGrace) drain += BALANCE.strandedDrain;
      }
    }
  }
  // Freie Punkte ziehen Stabilität, solange sie nicht aufgenommen sind
  for (const p of state.points) {
    if (p.kind === "wild" && p.age > BALANCE.wildGrace) drain += BALANCE.wildDrain;
  }

  let heal = BALANCE.passiveHeal;
  if (state.demo && state.stability < BALANCE.demoHealBelow) heal += BALANCE.demoHealRate;

  state.stability = clamp(state.stability + (heal - drain) * dt, 0, BALANCE.stabilityMax);

  if (state.stability <= 0) endGame(false);
}

function changeStability(delta) {
  state.stability = clamp(state.stability + delta, 0, BALANCE.stabilityMax);
}

function changeInfluence(delta) {
  state.influence = clamp(state.influence + delta, 0, BALANCE.influenceMax);
  // Tutorial: Einfluss-Hinweis erst, wenn er unter die Schwelle fällt
  if (!state.tutorial.influenceLowShown && state.influence < BALANCE.influenceHintBelow) {
    state.tutorial.influenceLowShown = true;
    showBubble({ anchor: "influence", text: T.tutorial.influenceLow, ttl: 6.5 });
    flashInfluence();
  }
}

function flashInfluence() {
  const block = $("influenceBlock");
  block.classList.remove("attention");
  void block.offsetWidth; // Animation zurücksetzen
  block.classList.add("attention");
  after(4, () => block.classList.remove("attention"));
}

/* --- Abfahrtstafel ----------------------------------------------------------
   Zeigt alle wartenden Anliegen: Station, Farbe (ein Punkt je Anliegen) und
   Countdown bis Minuspunkte drohen bzw. eine falsche Linie genommen wird.
   - Station ohne Verbindung:      Countdown bis zum Stabilitätsverlust
   - Station ohne passende Linie:  Countdown bis zur Ausweich-Verbindung
   - Freie Anliegen:               Countdown bis zum Stabilitätsverlust
   Anliegen mit passender Linie steigen gleich ein und erscheinen nicht. */
function boardEntries() {
  const rows = [];
  for (const st of state.stations) {
    const groups = new Map(); // je Farbe ein Eintrag pro Station
    for (const p of st.waiting) {
      if (st.conns.some((c) => c.line === p.color)) continue; // wird gleich abgeholt
      const limit = st.conns.length ? BALANCE.wrongBoardAfter : BALANCE.strandedGrace;
      const g = groups.get(p.color) || { count: 0, remain: Infinity };
      g.count++;
      g.remain = Math.min(g.remain, limit - p.wait);
      groups.set(p.color, g);
    }
    for (const [color, g] of groups) rows.push({ name: st.name, color, count: g.count, remain: g.remain });
  }
  for (const p of state.points) {
    if (p.kind === "wild") rows.push({ name: T.ui.boardWild, color: p.color, count: 1, remain: BALANCE.wildGrace - p.age });
  }
  rows.sort((a, b) => a.remain - b.remain); // dringendste zuerst
  return rows;
}

function renderBoard() {
  const list = $("boardList");
  const rows = boardEntries();
  list.replaceChildren();
  if (!rows.length) {
    const li = document.createElement("li");
    li.className = "empty";
    li.textContent = T.ui.boardEmpty;
    list.appendChild(li);
    return;
  }
  for (const row of rows) {
    const li = document.createElement("li");
    if (row.remain <= 1.5) li.className = "urgent";
    const dots = document.createElement("span");
    dots.className = "b-dots";
    for (let i = 0; i < Math.min(row.count, 4); i++) {
      const d = document.createElement("span");
      d.className = "b-dot";
      d.style.background = LINES[row.color].color;
      dots.appendChild(d);
    }
    const name = document.createElement("span");
    name.className = "b-name";
    name.textContent = row.name;
    const time = document.createElement("span");
    time.className = "b-time";
    time.textContent = Math.max(0, Math.ceil(row.remain)) + " s";
    li.append(dots, name, time);
    list.appendChild(li);
  }
}

/* --- HUD ------------------------------------------------------------------ */
function updateHud() {
  const stab = Math.round(state.stability ?? BALANCE.stabilityStart);
  $("stabilityValue").textContent = stab + " %";
  const fill = $("stabilityFill");
  if (isVerticalUI()) { // Seitenlayout: Balken läuft vertikal von oben nach unten
    fill.style.height = clamp(stab, 0, 100) + "%";
    fill.style.width = "100%";
  } else {
    fill.style.width = clamp(stab, 0, 100) + "%";
    fill.style.height = "100%";
  }
  fill.style.backgroundColor = stab > 50 ? "#46d98c" : stab > 25 ? "#ffc94d" : "#ff5a5a";

  $("influenceValue").textContent = Math.round(state.influence ?? BALANCE.influenceStart);

  const t = Math.ceil(state.timeLeft ?? BALANCE.gameDuration);
  $("timeValue").textContent = `${Math.floor(t / 60)}:${String(t % 60).padStart(2, "0")}`;
}

/* ====================================================================== [12]
   TUTORIAL & FEEDBACK — Bubbles, Toasts, FX
   ----------------------------------------------------------------------
   Bubbles sind große Glass-Sprechblasen direkt am relevanten Objekt
   (Kartenkoordinaten) oder an UI-Elementen verankert. Es ist höchstens
   eine Tutorial- UND eine Fehlerblase gleichzeitig sichtbar — so wird
   niemand mit Text zugeschüttet.
   ====================================================================== */
function showBubble({ map, anchor, text, ttl = 5, error = false }) {
  // bestehende Blase gleicher Art ersetzen
  state.bubbles = state.bubbles.filter((b) => {
    if (b.error === error) { b.el.remove(); return false; }
    return true;
  });

  const el = document.createElement("div");
  el.className = "bubble" + (error ? " error" : "");
  el.textContent = text;
  const b = { el, map: map ? { x: map.x, y: map.y } : null, anchor, error, placement: "above" };
  bubbleLayer.appendChild(el);
  state.bubbles.push(b);

  // Blase stört? Tipp/Klick blendet sie sofort aus …
  el.addEventListener("pointerdown", () => dismissBubble(b));
  // … die Maus darüber öffnet ein weiches Sichtloch um den Cursor …
  el.addEventListener("pointermove", (e) => {
    if (e.pointerType !== "mouse") return;
    const r = el.getBoundingClientRect();
    el.style.setProperty("--mx", (e.clientX - r.left) + "px");
    el.style.setProperty("--my", (e.clientY - r.top) + "px");
    el.classList.add("masked");
  });
  // … und wer darauf verharrt, blendet sie ganz aus
  let dwellTimer = null;
  el.addEventListener("pointerenter", (e) => {
    if (e.pointerType !== "mouse") return;
    dwellTimer = after(1.2, () => dismissBubble(b));
  });
  el.addEventListener("pointerleave", () => {
    if (dwellTimer !== null) { cancelAfter(dwellTimer); dwellTimer = null; }
    el.classList.remove("masked");
  });

  if (b.map) b.placement = chooseBubblePlacement(b); // Stationen/Punkten ausweichen
  positionBubble(b);

  after(ttl, () => dismissBubble(b));
}

function dismissBubble(b) {
  if (!state.bubbles.includes(b)) return;
  b.el.classList.add("out");
  after(0.35, () => {
    b.el.remove();
    state.bubbles = state.bubbles.filter((q) => q !== b);
  });
}

/* Wählt für kartenverankerte Blasen die Seite (oben/unten/rechts/links),
   auf der die Blase am wenigsten Stationen und Punkte verdeckt. */
function chooseBubblePlacement(b) {
  const c = mapToClient(b.map.x, b.map.y);
  const w = b.el.offsetWidth, h = b.el.offsetHeight, GAP = 18, PAD = 14;
  const rects = {
    above: { x: c.x - w / 2, y: c.y - 16 - GAP - h, w, h },
    below: { x: c.x - w / 2, y: c.y + 16 + GAP, w, h },
    right: { x: c.x + 16 + GAP, y: c.y - h / 2, w, h },
    left:  { x: c.x - 16 - GAP - w, y: c.y - h / 2, w, h },
  };
  // Bildschirmpositionen aller Objekte, die nicht verdeckt werden sollen
  const targets = [];
  for (const s of state.stations) targets.push(mapToClient(s.x, s.y));
  for (const p of state.points) targets.push(mapToClient(p.x, p.y));
  let best = "above", bestScore = Infinity;
  for (const [placement, r] of Object.entries(rects)) {
    let score = 0;
    // außerhalb des Fensters? stark abwerten
    if (r.x < 4 || r.y < 4 || r.x + r.w > window.innerWidth - 4 || r.y + r.h > window.innerHeight - 4) score += 100;
    for (const t of targets) {
      if (t.x > r.x - PAD && t.x < r.x + r.w + PAD && t.y > r.y - PAD && t.y < r.y + r.h + PAD) score++;
    }
    if (score < bestScore) { bestScore = score; best = placement; }
  }
  return best;
}

function positionBubble(b) {
  let cx = 0, cy = 0;
  if (b.map) {
    const c = mapToClient(b.map.x, b.map.y);
    b.el.classList.toggle("below", b.placement === "below");
    b.el.classList.toggle("side", b.placement === "left");
    b.el.classList.toggle("side-right", b.placement === "right");
    if (b.placement === "above")      { cx = c.x; cy = c.y - 16; }
    else if (b.placement === "below") { cx = c.x; cy = c.y + 16; }
    else                              { cx = c.x; cy = c.y; } // links/rechts: vertikal zentriert
    if (b.placement === "above" || b.placement === "below") {
      cx = clamp(cx, 190, window.innerWidth - 190); // im Fenster halten
    }
  } else if (b.anchor) {
    // UI-verankerte Blasen: Position je nach Layout (UI oben/unten vs. seitlich)
    const setCls = (cls) => {
      b.el.classList.toggle("below", cls === "below");
      b.el.classList.toggle("side", cls === "side");
      b.el.classList.toggle("side-right", cls === "side-right");
    };
    if (b.anchor === "lineMenu") {
      const r = lineMenu.getBoundingClientRect();
      if (isVerticalUI()) { setCls("side"); cx = r.left - 10; cy = r.top + r.height / 2; }
      else { setCls(null); cx = r.left + r.width / 2; cy = r.top - 10; }
    } else if (b.anchor === "influence") {
      const r = $("influenceBlock").getBoundingClientRect();
      if (isVerticalUI()) { setCls("side-right"); cx = r.right + 10; cy = r.top + r.height / 2; }
      else { setCls("below"); cx = r.left + r.width / 2; cy = r.bottom + 6; }
    } else if (b.anchor === "dock") {
      const r = dockLabel.getBoundingClientRect();
      if (isVerticalUI()) { setCls("side"); cx = r.left - 8; cy = r.top + r.height / 2; }
      else { setCls(null); cx = r.left + r.width / 2; cy = r.top - 8; } // mittig über dem Label
    }
  }
  b.el.style.left = cx + "px";
  b.el.style.top = cy + "px";
}
function layoutBubbles() { for (const b of state.bubbles) positionBubble(b); }

/* Kleine Toasts unten in der Mitte */
function showToast(text, error = false) {
  while (toastLayer.children.length >= 2) toastLayer.firstChild.remove();
  const el = document.createElement("div");
  el.className = "toast" + (error ? " error" : "");
  el.textContent = text;
  toastLayer.appendChild(el);
  after(2.6, () => { el.classList.add("out"); after(0.4, () => el.remove()); });
}

/* Roter Vollbild-Blitz (falsche Linie) */
function flashRed() {
  const f = $("flash");
  f.classList.add("on");
  after(0.12, () => f.classList.remove("on"));
}

/* Pulsring auf der Karte (Aufmerksamkeit) */
function pulseAt(x, y, r, color) {
  const c = svgEl("circle", { class: "fx-pulse", cx: x, cy: y, r, stroke: color, "stroke-width": 20 });
  gFx.appendChild(c);
  after(1, () => c.remove());
}
/* Erfolgsring bei Lieferung */
function rippleAt(x, y) {
  const c = svgEl("circle", { class: "fx-ripple", cx: x, cy: y, r: 120, "stroke-width": 14 });
  gFx.appendChild(c);
  after(0.8, () => c.remove());
}
/* Schwebender Belohnungs-/Kostentext (Kartenkoordinaten → Bildschirm) */
function floatTextAtClient(x, y, text) {
  const c = mapToClient(x, y);
  const el = document.createElement("div");
  el.className = "floatText";
  el.textContent = text;
  el.style.left = c.x + "px";
  el.style.top = (c.y - 30) + "px";
  fxHtmlLayer.appendChild(el);
  after(1.4, () => el.remove());
}

/* Kontinent-Aufleuchten nach Klick */
function flashContinent(cid) {
  const paths = continentPaths[cid];
  paths.forEach((p) => p.classList.add("continent-flash"));
  after(0.6, () => paths.forEach((p) => p.classList.remove("continent-flash")));
}

/* ====================================================================== [13]
   DEMO-/KIOSK-MODUS
   ----------------------------------------------------------------------
   Der Bot spielt fehlerfrei (nur passende Linienfarben), läuft endlos und
   landet nie auf einem Sieg-/Niederlage-Screen. Jede echte Interaktion
   bricht die Demo sofort ab und führt zum Startscreen zurück.
   ====================================================================== */
let demoInputBlockUntil = 0; // direkt nach Demo-Start Eingaben kurz ignorieren

function enterDemo() {
  demoInputBlockUntil = performance.now() + 400;
  startGame(true);
}

function exitDemo() {
  resetToStart();
  lastActivity = performance.now();
}

function setDemoVisuals(on) {
  $("demoGlow").classList.toggle("hidden", !on);
  $("demoBadge").classList.toggle("hidden", !on);
  $("demoHint").classList.toggle("hidden", !on);
  $("demoBadge").textContent = T.ui.demoBadge;
  $("demoHint").textContent = T.ui.demoHint;
  $("restartBtn").style.visibility = on ? "hidden" : "visible";
}

/* Demo-Runde läuft ab → nahtlos neue Runde starten (niemals Endscreen) */
function demoSoftRestart() {
  const fade = $("fade");
  fade.classList.add("on");
  state.running = false;
  setTimeout(() => {   // bewusst kein after(): überlebt den resetRound in startGame
    if (state.demo) startGame(true);
    fade.classList.remove("on");
  }, 400);
}

/* Eine Bot-Aktion pro Intervall: dringende Probleme zuerst */
function demoBotTick(dt) {
  state.botTimer -= dt;
  if (state.botTimer > 0) return;
  state.botTimer = BALANCE.demoBotInterval;

  // Demo hält sich selbst flüssig: Einfluss geht nie aus
  if (state.influence < 60) state.influence = Math.min(BALANCE.influenceMax, state.influence + 90);

  // 1) Wartende Punkte ohne passende Linie an ihrer Station versorgen
  for (const st of state.stations) {
    const colors = new Set(st.waiting.map((p) => p.color));
    for (const color of colors) {
      if (st.conns.some((c) => c.line === color)) continue;
      const target = nearestStation(st, (s) => s.continent === color) || nearestStation(st);
      if (target && tryBuildConnection(st, target, color, { silent: true })) return;
    }
  }
  // 2) Komplett unverbundene Stationen anschließen (in Kontinentfarbe)
  const lonely = state.stations.find((s) => !s.conns.length);
  if (lonely && state.stations.length > 1) {
    const target = nearestStation(lonely);
    if (target) tryBuildConnection(lonely, target, lonely.continent, { silent: true });
  }
}

function nearestStation(from, filter) {
  let best = null, bd = Infinity;
  for (const s of state.stations) {
    if (s === from || (filter && !filter(s))) continue;
    const d = dist(s, from);
    if (d < bd) { bd = d; best = s; }
  }
  return best;
}

/* Demo platziert neue Stationen direkt (ohne Dock) — bevorzugt bei freien Punkten */
function demoPlaceStation() {
  const wild = state.points.find((p) => p.kind === "wild");
  let x, y, cid;
  if (wild) {
    cid = wild.continent;
    x = wild.x; y = wild.y;
  } else {
    cid = chooseContinent();
    const pos = pickSpawnPos(cid);
    x = pos.x; y = pos.y;
  }
  state.placedBeyondAuto++;
  const st = createStation(x, y, cid);
  pickupWildNearStation(st);
}

/* ====================================================================== [14]
   EINGABEN — Pointer (Maus + Touch), Tipp-Tipp-Bau, Drag & Drop, Inaktivität
   ====================================================================== */
let lastActivity = performance.now();
let lastPointerPos = null;

/* Globale Aktivitätserkennung (Klick, Touch, Mausbewegung, Taste).
   Im Demo-Modus bricht JEDE echte Eingabe die Demo sofort ab. */
function registerActivity(e) {
  if (e && e.type === "pointermove") {
    // nur echte Bewegungen zählen (Sensor-Jitter ignorieren)
    const p = { x: e.clientX, y: e.clientY };
    if (lastPointerPos && Math.hypot(p.x - lastPointerPos.x, p.y - lastPointerPos.y) < 6) return;
    lastPointerPos = p;
  }
  lastActivity = performance.now();
  if (state.demo && performance.now() > demoInputBlockUntil) exitDemo();
}
for (const ev of ["pointerdown", "pointermove", "keydown", "wheel", "touchstart"]) {
  window.addEventListener(ev, registerActivity, { capture: true, passive: true });
}

function checkIdle(now) {
  if (state.demo) return;
  const infoOpen = !$("screen-info").classList.contains("hidden");
  const limit = (infoOpen ? BALANCE.idleToDemoInfo
    : state.screen === "game" ? BALANCE.idleToDemoGame
    : BALANCE.idleToDemoMenu) * 1000;
  if (now - lastActivity > limit) enterDemo();
}

/* Treffer-Radius dynamisch: ~30 px auf dem Bildschirm, unabhängig von der Kartengröße */
function hitRadius() { return Math.max(160, 30 / mapScale()); }

function stationAt(x, y, exclude) {
  let best = null, bd = hitRadius();
  for (const s of state.stations) {
    if (s === exclude) continue;
    const d = Math.hypot(s.x - x, s.y - y);
    if (d < bd) { bd = d; best = s; }
  }
  return best;
}

/* --- Auswahlring (Tipp-Tipp-Bau) --- */
let selectRingEl = null;
function showSelectRing(st) {
  clearSelectRing();
  selectRingEl = svgEl("circle", { class: "select-ring", cx: st.x, cy: st.y, r: 115 });
  gFx.appendChild(selectRingEl);
}
function clearSelectRing() {
  if (selectRingEl) selectRingEl.remove();
  selectRingEl = null;
  state.selectedStation = null;
}

/* --- Stage: Linienbau & Kontinent-Klick ---
   Verbindungen entstehen NUR zwischen platzierten Stationen: Start- und
   Endpunkt werden ausschließlich über stationAt() ermittelt — freie Punkte,
   UI-Elemente oder leere Karte können nie Linien-Endpunkt werden. */
stage.addEventListener("pointerdown", (e) => {
  if (state.screen !== "game" || !state.running || state.demo || state.drag) return;
  const m = clientToMap(e.clientX, e.clientY);
  const st = stationAt(m.x, m.y);

  if (st) {
    // Tipp-Tipp: war schon eine Station gewählt → direkt verbinden
    if (state.selectedStation && state.selectedStation !== st) {
      const from = state.selectedStation;
      clearSelectRing();
      tryBuildConnection(from, st, state.activeLine);
      return;
    }
    // Drag starten (oder Tipp zur Auswahl — entschieden bei pointerup)
    state.drag = {
      type: "line", pointerId: e.pointerId, from: st,
      snapped: null,
      downAt: performance.now(), downPos: { x: e.clientX, y: e.clientY },
    };
    try { stage.setPointerCapture(e.pointerId); } catch (_) {}
    updateGhostLine(e);
  } else {
    if (state.selectedStation) { clearSelectRing(); return; }
    // möglicher Kontinent-Klick (bei pointerup entschieden)
    state.tapCandidate = { downAt: performance.now(), downPos: { x: e.clientX, y: e.clientY }, map: m };
  }
});

stage.addEventListener("pointermove", (e) => {
  if (state.drag?.type === "line" && e.pointerId === state.drag.pointerId) updateGhostLine(e);
});

stage.addEventListener("pointerup", (e) => {
  /* Kontinent-Klick? (kurzer Tipp ohne Bewegung, nicht auf einer Station) */
  const tap = state.tapCandidate;
  state.tapCandidate = null;
  if (!state.drag && tap && state.running && !state.demo &&
      performance.now() - tap.downAt < 400 &&
      Math.hypot(e.clientX - tap.downPos.x, e.clientY - tap.downPos.y) < 14) {
    const cid = continentAt(tap.map.x, tap.map.y);
    if (cid) {
      state.preferredContinent = cid;
      flashContinent(cid);
      showToast(T.ui.continentToast);
    }
    return;
  }

  const drag = state.drag;
  if (!drag || drag.type !== "line" || e.pointerId !== drag.pointerId) return;
  state.drag = null;
  gGhost.replaceChildren();
  costChip.style.display = "none";

  const quickTap = performance.now() - drag.downAt < 350 &&
    Math.hypot(e.clientX - drag.downPos.x, e.clientY - drag.downPos.y) < 14;

  if (quickTap) {
    // Tipp auf Station → für Tipp-Tipp-Bau auswählen
    state.selectedStation = drag.from;
    showSelectRing(drag.from);
    return;
  }
  if (drag.snapped && drag.snapped !== drag.from) {
    tryBuildConnection(drag.from, drag.snapped, state.activeLine);
  }
});

stage.addEventListener("pointercancel", () => {
  state.drag = null;
  state.tapCandidate = null;
  gGhost.replaceChildren();
  costChip.style.display = "none";
});

/* Vorschau beim Ziehen: octilineare Ghost-Linie + Kosten-Chip.
   Bei zu wenig Einfluss: rote gestrichelte Linie + roter Chip. */
function updateGhostLine(e) {
  const drag = state.drag;
  const m = clientToMap(e.clientX, e.clientY);
  drag.snapped = stationAt(m.x, m.y, drag.from);

  const end = drag.snapped || m;
  const pts = octiRoute(drag.from.x, drag.from.y, end.x, end.y);
  const cost = connectionCost(routeLength(pts));
  const affordable = cost <= state.influence;

  gGhost.replaceChildren();
  gGhost.appendChild(svgEl("path", {
    class: "ghost-line" + (affordable ? "" : " invalid"),
    d: routePathD(pts), stroke: LINES[state.activeLine].color, "stroke-width": 44,
  }));
  if (drag.snapped) {
    gGhost.appendChild(svgEl("circle", {
      cx: drag.snapped.x, cy: drag.snapped.y, r: 135,
      fill: "none", stroke: "#fff", "stroke-width": 10, opacity: 0.8,
    }));
  }

  costChip.style.display = "block";
  costChip.textContent = `−${cost} ${T.ui.influenceLabel}`;
  costChip.classList.toggle("tooExpensive", !affordable);
  costChip.style.left = e.clientX + "px";
  costChip.style.top = e.clientY + "px";
}

/* --- Dock: frei platzierbare Station greifen und ziehen --- */
$("dockDotWrap").addEventListener("pointerdown", (e) => {
  if (!state.offer || state.offer.grabbed || !state.running || state.demo) return;
  e.preventDefault();
  state.offer.grabbed = true;
  setDockIdle(); // Dot ist "entnommen" → Bereich zurück in den Ruhezustand
  state.drag = { type: "station", pointerId: e.pointerId };
  // ab jetzt global verfolgen — der Finger verlässt das Dock
  window.addEventListener("pointermove", onStationDragMove);
  window.addEventListener("pointerup", onStationDragEnd);
  window.addEventListener("pointercancel", onStationDragEnd);
  onStationDragMove(e);
});

function onStationDragMove(e) {
  const drag = state.drag;
  if (!drag || drag.type !== "station" || e.pointerId !== drag.pointerId) return;
  const m = clientToMap(e.clientX, e.clientY);
  const cid = continentAt(m.x, m.y);

  // Ghost-Station: weißer Kreis; Ringfarbe zeigt Kontinent, rot-gestrichelt = ungültig
  gGhost.replaceChildren();
  const g = svgEl("g", { transform: `translate(${m.x},${m.y})`, opacity: 0.9 });
  g.appendChild(svgEl("circle", { r: 95, fill: "rgba(3,12,35,0.35)" }));
  g.appendChild(svgEl("circle", {
    r: 62, fill: "#fff",
    stroke: cid ? LINES[cid].color : "#ff4040", "stroke-width": 16,
    "stroke-dasharray": cid ? "none" : "40 28",
  }));
  gGhost.appendChild(g);
}

function onStationDragEnd(e) {
  const drag = state.drag;
  if (!drag || drag.type !== "station" || (e && e.pointerId !== drag.pointerId)) return;
  window.removeEventListener("pointermove", onStationDragMove);
  window.removeEventListener("pointerup", onStationDragEnd);
  window.removeEventListener("pointercancel", onStationDragEnd);
  state.drag = null;
  gGhost.replaceChildren();
  if (!state.offer) return;

  const m = clientToMap(e.clientX, e.clientY);
  const cid = continentAt(m.x, m.y);
  if (cid) {
    // gültiger Drop → Station bekommt die Farbe des tatsächlich getroffenen Kontinents
    finishOfferPlacement(m.x, m.y, cid, false);
  } else {
    // ungültiger Drop (Wasser/See) → ablehnen und automatisch gültig platzieren
    showToast(T.errors.invalidDrop, true);
    const fallbackCid = state.preferredContinent || chooseContinent();
    const pos = pickSpawnPos(fallbackCid);
    finishOfferPlacement(pos.x, pos.y, fallbackCid, true);
  }
}

/* --- Buttons --- */
$("startBtn").addEventListener("click", () => startGame(false));
$("restartBtn").addEventListener("click", resetToStart);
$("playAgainBtn").addEventListener("click", () => startGame(false));
$("toStartBtn").addEventListener("click", resetToStart);

/* Abfahrtstafel auf-/zuklappen */
$("boardToggle").addEventListener("click", () => {
  const board = $("departureBoard");

/* Info-Overlay (Anleitung) öffnen/schließen — nur vom Startscreen aus */
$("infoBtn").addEventListener("click", () => $("screen-info").classList.remove("hidden"));
$("infoCloseBtn").addEventListener("click", () => $("screen-info").classList.add("hidden"));
$("screen-info").addEventListener("click", (e) => {

});

/* Escape = Not-Reset für die Standbetreuung */
window.addEventListener("keydown", (e) => { if (e.key === "Escape") resetToStart(); });

/* Kontextmenü im Kioskbetrieb unterdrücken */
window.addEventListener("contextmenu", (e) => e.preventDefault());

/* ====================================================================== [15]
   INIT
   ====================================================================== */
function applyStaticTexts() {
  const title = T.ui.title;
  const ix = title.indexOf(":"); // Akzentfarbe auf den Teil nach dem Doppelpunkt
  $("startTitle").innerHTML = ix > 0
    ? `${title.slice(0, ix + 1)}<br><span class="accent">${title.slice(ix + 1).trim()}</span>`
    : title;
  $("startSubtitle").textContent = T.ui.subtitle;
  $("startIntro").innerHTML = T.ui.intro;
  $("startBtn").textContent = T.ui.startBtn;
  $("restartBtn").querySelector(".r-text").textContent = T.ui.restartBtn;
  $("playAgainBtn").textContent = T.ui.playAgainBtn;
  $("toStartBtn").textContent = T.ui.toStartBtn;
  $("stabilityLabel").textContent = T.ui.stabilityLabel;
  $("influenceLabel").textContent = T.ui.influenceLabel;
  $("timeLabel").textContent = T.ui.timeLabel;
  $("versionTag").textContent = T.ui.version || "";
  $("boardTitleText").textContent = T.ui.boardTitle;
  buildInfoPanel();
}

/* Info-Panel befüllen: Texte aus texts.js, Zahlen live aus BALANCE.
   So zeigt die Anleitung immer die aktuellen Balancing-Werte. */
function buildInfoPanel() {
  const de = (n) => String(n).replace(".", ","); // deutsche Dezimalschreibweise
  const tokens = {
    "{TRANSPORT}":  de(BALANCE.rewardStability),
    "{EINFLUSS}":   de(BALANCE.rewardInfluence),
    "{HEILUNG}":    de(BALANCE.passiveHeal),
    "{FALSCH}":     de(BALANCE.penaltyWrongLine),
    "{STAU}":       de(BALANCE.overloadDrain),
    "{STAU_AB}":    de(BALANCE.overloadThreshold),
    "{OHNE}":       de(BALANCE.strandedDrain),
    "{FREI}":       de(BALANCE.wildDrain),
    "{KOSTEN_MIN}": de(BALANCE.costMin),
    "{KOSTEN_MAX}": de(BALANCE.costMax),
  };
  const fill = (text) => Object.entries(tokens).reduce((s, [k, v]) => s.split(k).join(v), text);
  const fillList = (el, items) => {
    el.replaceChildren();
    for (const item of items) {
      const li = document.createElement("li");
      li.textContent = fill(item);
      el.appendChild(li);
    }
  };
  /* Ein Themenblock (z. B. Netzstabilität) = Überschrift + 2-Spalten-Tabelle */
  const buildSection = (sec) => {
    const wrap = document.createElement("div");
    wrap.className = "scoring-section";
    const h = document.createElement("h4");
    h.textContent = sec.title;
    wrap.appendChild(h);
    const grid = document.createElement("div");
    grid.className = "scoring-table";
    for (const [cls, header, items] of [
      ["plus", T.info.plusHeader, sec.plus],
      ["minus", T.info.minusHeader, sec.minus],
    ]) {
      const col = document.createElement("div");
      col.className = "col " + cls;
      const head = document.createElement("div");
      head.className = "col-head";
      head.textContent = header;
      col.appendChild(head);
      const ul = document.createElement("ul");
      ul.className = "scoring " + cls;
      fillList(ul, items);
      col.appendChild(ul);
      grid.appendChild(col);
    }
    wrap.appendChild(grid);
    return wrap;
  };
  $("infoTitle").textContent = T.info.title;
  $("infoScoringTitle").textContent = T.info.scoringTitle;
  $("infoCloseBtn").textContent = T.info.closeBtn;
  fillList($("infoHowTo"), T.info.howTo);
  $("infoScoring").replaceChildren(buildSection(T.info.stability), buildSection(T.info.influence));
}

function init() {
  if (!window.GAME_TEXTS) {
    alert("texts.js fehlt oder konnte nicht geladen werden.");
    return;
  }
  applyStaticTexts();
  indexMapPaths();
  buildSpawnPools();
  resetToStart();
  requestAnimationFrame((t) => { lastFrame = t; requestAnimationFrame(loop); });
}

init();
</script>
